body:
  text: 卷下第二十七章十五絡名問何謂十五絡答大腸偏歷肺列缺脾絡公孫胃豐隆小腸支正心通里膀胱飛揚腎大鐘心包內關三焦外肝絡蠡溝膽光明更有太包脾大絡督絡長強任會陰注手陽明大腸經絡為偏歷手太陰肺經絡為列缺足太陰脾經絡為公孫足陽明胃經絡為豐隆手太陽小腸經絡為支正手少陰心經絡為通里足太陽膀胱經絡為飛揚足少陰腎經絡為大鐘手厥陰心包經絡為內關手少陽三焦經絡為外關足厥陰肝經絡為蠡溝足少陽膽經絡為光明又脾經大絡名太包督脈之絡名長強任脈之絡名會陰共為十五絡第二十八章十五絡穴別走主治問十五絡穴別走主治歌呢答肺之別絡列缺名腕上寸半走陽明經入掌中散魚際補虛欠呿瀉掌心心之別絡通里穴腕下一寸太陽別經入心中系目舌補不能言瀉支膈心包別絡內關主腕後二寸少陽走循經上繫心包絡心痛實瀉頭搖補小腸別絡支正名腕後五寸走少陰別上循肘肩髃絡瀉肘節廢補疣生大腸別絡偏歷尋腕上三寸走太陰循行肩臂上頰齒補齒寒痹瀉齲聾三焦別絡名外關腕後二寸厥陰間外繞肘臂胸中注補手不收瀉手攣膀胱別絡飛揚屬踝上七寸少陰足實瀉鼻塞頭背疼補虛專治鼻鼽衄膽經別絡穴光明踝上五寸走厥陰絡循足跗瀉實厥補痿躄坐起不能胃之別絡號豐隆踝上八寸太陰通循脛上頭絡喉嗌實瀉狂癲補脛枯脾之別絡是公孫拇節後寸走陽明主治腸胃厥氣逆補腹鼓脹瀉腸疼腎之別絡即大鐘溪下五分太陽通別走心包外腰脊虛補腰痛泄閉癃肝之別絡蠡溝當踝上五寸走少陽循脛上睪與莖結睪莖卒疝虛實詳督絡長強骶骨端俠脊上項散頭前傍肩貫膂走任脈瀉背脊強補頭旋任絡屏翳又會陰穴在二便兩陰中上循鳩尾散於腹補腹瘙癢泄脹膨脾之大絡太包穴腋下六寸布胸脅補虛百節皆縱弛實則身痛法當泄第二十九章奇經八脈説及八脈起止穴名歌問何謂奇經八脈答脈有督任沖帶陽維陰維陽蹺陰蹺皆由正經別出另有處所故曰奇經然經有十二絡有十五凡二十七脈氣血相隨治十二經即禹疏九河之謂也至於雨水過多各河暴漲溢出溝渠皆盈此所謂病入奇經治法當如瀹濟漯決汝漢排淮泗之水若徒在十二經中調治則不應矣當取奇經八脈主穴治之即疏通溝渠之謂而取經外奇穴亦本此意問奇經八脈起止穴名歌呢答督起長強齦交唇任始會陰承漿終沖首橫骨幽門止帶在季肋維道中陽蹺申脈上承泣陰蹺照海交信通陽維金門啞門內陰維廉泉起築賓第三十章督脈經穴歌注問督脈經共二十八穴系何名在何處主治何病答長強骶骨端三分七壯三分伏地尋腸風痔漏腰脊痛痢疝疳蝕及五淋注長強穴在脊骶骨端下三分伏地取足少陰少陽之會督脈之絡別走任脈三分七壯此穴乃痔根本主治腸風下血痔漏腰脊痛狂病大小便難頭重洞泄五淋小兒顱囟陷驚癇瘛瘲脫肛瀉血赤白下痢灸龜尾即窮骨頭多壯極效按玉龍賦云兼承山灸痔最妙席弘賦云連大杼行針治小兒氣痛百證賦云兼百會治脫肛靈光賦云百會治痢疾天星祕訣兼大敦治疝氣問腰俞穴呢答腰俞草一椎下中二分五壯腰脊疼冷痹溫瘧汗不出婦人溺赤兼閉經注腰俞穴在二十一椎下宛宛中二分五壯一曰五分七壯主治腰脊痛不得俯仰腰腳冷痹不仁灸隨年壯溫瘧汗不出婦人經閉溺赤灸後忌房勞強力按千金云治腰卒痛灸七壯席弘賦云兼環跳治冷風痹問陽關穴呢答陽關在十六椎間三壯五分伏臥探主治膝疼難伸屈風痹筋攣等症安注陽關在十六椎下伏取五分三壯主治膝痛不可屈伸風痹筋攣等症問命門穴呢答命門十四椎下間前與臍平仔細探三壯五分腰腎痛遺精帶下症虛寒注命門穴在十四椎下前平臍或用棍取或用線取五分三壯主治腎虛腰痛帶下遺精耳鳴手足攣痹驚眩頭痛身熱骨蒸痎瘧瘛瘲裡急腹痛等症按千金云腰痛不能動者灸隨年壯神農經云治腰痛可灸七壯玉龍賦云兼腎俞治老人便數標幽賦云兼肝俞能使瞽者得見一傳此穴灸寒熱之症多效問懸樞穴呢答懸樞在十三椎下三壯三分遵古法主治腰脊難俯仰腹中積痛穀不化注懸樞穴在十三椎下伏取三分三壯主治腰痛腹中積氣疼痛穀不化瀉痢等症問脊中穴呢答脊中十一椎下是五分禁灸俯取之風癇癲邪不嗜食五痔積聚脫肛醫注脊中穴在十一椎下俯取五分禁灸主治風癇癲邪腹滿不食五痔積聚下痢小兒赤白痢秋末脫肛痛不可忍灸之最效問中樞穴呢答中樞十椎之下尋惟有氣穴論注登主治心背相控痛三壯退熱進食能注中樞穴在十椎下俯取此穴諸書未載惟氣府論督脈下王氏注中有此穴及考之氣穴論曰背與心相控而痛所治天突與十椎者即此穴也五分禁灸一傳云此穴能退熱進食三壯屢效問筋縮穴呢答筋縮穴第九椎藏五分三壯俯取探主治風癇目上視癲狂驚恐並脊強注筋縮穴在九椎下五分三壯主治癲狂脊強風癇上視百證賦云兼水道治脊強問至陽穴呢答至陽穴在七椎間五壯三分黃疸安少氣難言胸脅滿腰脊肢痛胃中寒注至陽穴在七椎下俯取五壯三分主治腰脊強痛胃中寒不嗜食少氣難言胸脅支滿羸瘦黃疸淫濼脛酸一云灸三壯治喘氣立愈按神農經云治寒熱脛酸四肢重痛咳嗽灸三壯至七壯玉龍賦云卻疸治神疲問靈臺穴呢答靈臺在六椎下尋甲乙經中無此名氣府論治喘不臥風冷久嗽三壯神注靈臺穴在六椎下禁針三壯甲乙經無此穴惟氣府論注主治氣喘久嗽等症問神道穴呢答神道五椎之下存禁針五壯主頭疼痎瘧健忘牙車急小兒風癇灸即寧注神道穴在五椎下禁針五壯主治傷寒頭痛寒熱往來痎瘧悲愁健忘驚悸牙車急張口不合小兒風癇瘛瘲灸七壯按百證賦云兼心俞治風癇問身柱穴呢答身柱三椎取宜俯腰脊疼痛分壯五癲瘤狂怒欲殺人瘛瘲身熱妄言語注身柱穴在三椎下五分五壯主治腰脊痛癲癇狂走怒欲殺人瘛瘲身熱小兒驚癇按神農經云咳嗽可灸十四壯玉龍賦云能蠲嗽除膂痛百證賦云兼本神治癲疾乾坤生意云同陶道肺俞膏肓治虛損五勞七傷一傳治四時傷寒問陶道穴呢答陶道俯取一椎際督脈足太陽相會五分五壯治頭暈痎瘧寒熱灑淅纍注陶道穴在一椎下乃督脈足太陽之會五分五壯主治痎瘧寒熱灑淅脊強煩滿汗不同頭重目瞑瘛瘲恍惚不樂一傳善退骨蒸之熱問大椎穴呢答大椎一椎上陷中平肩手足三陽會久瘧肺脹五壯分頸項背膊勞濕痹注大椎穴在一椎上陷中一曰平肩手足三陽脈之會五壯五分一云以年為壯大杼為骨會骨病者可灸之主治五勞七傷乏力風勞濕痹痎瘧久不愈肺脹脅滿嘔吐上氣背膊拘急項頸強不得回顧一云能瀉胸中之熱及諸熱氣若灸寒熱之法先大杼次長強以年為壯一云治身痛寒熱風氣痛一云治衄血不止灸二三十壯可斷根按千金云凡瘧有不可瘥者從未發前灸大椎至發時滿百壯無不瘥又云諸煩熱時行溫病灸大椎百壯刺三分瀉之又治氣短不語壯隨年數又治頸癭灸百壯及大椎兩旁相去各一寸半少垂下各三十壯玉龍賦云百勞止虛汗神農經云治小兒急慢驚風又竇太師治諸虛寒熱灸此捷徑云治熱不至肩時傳此穴治百病問啞門穴呢答啞門項後入髮際五分宛中仰頭取二分禁灸頸項強陽熱衄血中風侶注啞門穴在項後入髮際五分宛宛中仰頭取之督脈陽維之會入系舌本三分不可深禁灸主治頸項強急不語諸陽熱盛衄血不止脊強反折瘛瘲癲疾頭風疼痛汗不出寒熱風痙中風尸厥不省人事百症賦云兼關衝治舌緩不語問風府穴呢答風府入髮際一寸三分禁灸身不遂暴喑身重頭項強目眩鼻衄狂恐悸注風府穴在項上入髮際一寸大筋內宛宛中疾言其肉立起言休其肉立下督脈陽維之會三分禁灸主治中風舌緩暴喑不語振寒汗出身重偏風半身不遂傷風頭痛項急不得回顧目眩反視鼻衄咽痛狂走悲恐驚悸一云主瀉胸中之熱與大杼缺盆中府同按席弘賦云風府風池尋得到傷寒百病一時消又云陽明二日尋風府又云從來風府最難尋須用工夫度淺深倘能膀胱氣未散更宜三里穴中尋通玄賦云風傷項急求風府一傳治感冒風寒嘔吐不止千金云十三鬼穴此名鬼枕治百邪癲狂問腦戶穴呢答腦戶風上寸半尋此穴須當禁灸針督脈足太陽相會針則立死灸則喑注腦戶穴在風府上寸半督脈足太陽之會禁針灸刺中腦立死灸令人喑問強間穴呢答強間腦戶上寸半二分五壯目眩患頭痛腦旋頸項強嘔吐涎沫心煩亂注強間穴在腦戶穴上寸半二分五壯一曰禁灸主治頭痛項強目眩腦旋煩心嘔吐涎沫狂走按百證賦云兼豐隆治頭痛難禁問後頂穴呢答後頂強間上寸半二分五壯主治見頸項強急額顱痛偏頭惡風眼目眩注後頂穴在強間上寸半五壯二分主治頸強急額顱痛偏頭痛惡風目眩不明問百會穴呢答百會後頂寸五量耳尖直上會諸陽二分五壯頭風痛耳鼻口病身反張注百會穴在後頂上寸半頂中央直兩耳尖上對是穴督脈足太陽之會手足少陽足厥陰俱會於此二分五壯甲乙經三分三壯一曰灸頭頂不得過七七壯主治頭風頭痛耳聾鼻塞鼻衄中風言語蹇澀口噤不開或多悲哭偏風半身不遂風癇卒厥角弓反張吐沫心神恍惚驚悸健忘痎瘧女人血風胎前産後風疾小兒風癇驚風脫肛久不瘥一曰百病皆治一曰治悲笑欲死四肢冷氣欲絶身口溫可針人中三分灸百會三壯即蘇史記載扁鵲治虢太子尸厥針取三陽五會而蘇按神農經云治頭風可灸三壯並治小兒脫肛艾炷如小麥玉龍賦云兼囟會治卒中風靈光賦云兼龜尾治痢疾席弘賦云小兒脫肛患多時先灸百會後尾骶又云兼太衝照海陰交治咽喉疾問前頂穴呢答前頂離百會寸半二分五壯頭目眩小兒驚癇瘛瘲風頸項腫痛並赤面注前頂穴在百會前寸半二分五壯主治頭風目眩面赤腫小兒驚癇瘛瘲鼻多清涕頸項腫痛按神農經云治小兒驚風炷如小麥百症賦兼水溝治面腫虛浮問囟會穴呢答囟會前頂寸半得小兒針之凶短折二分五壯腦虛疼頭項腫病並面赤注囟會穴在前頂前寸半五壯二分小兒禁針蓋其囟門未合刺之令人夭主治腦虛冷痛頭風腫痛項痛飲酒過多頭皮腫風癇清涕一云治目眩面腫鼻塞驚癇不識人灸二七壯初灸不痛病去即痛痛即罷灸若是鼻塞灸至四日漸退七日頓愈針入二分得氣即瀉頭風生白屑針之彌佳針畢以鹽末和麻油擦之於髮根下則頭風永除按神農經治頭痛三壯小兒驚風三壯千金云邪病鬼癲囟上主之又名曰鬼門玉龍賦云兼百會治卒中風百證賦云連玉枕療頭風問上星穴呢答上星去囟會一寸入前髮際一寸許頭目鼻面諸般疼五壯三分瀉熱氣注上星穴在囟會前一寸真入髮際一寸三分五壯一云宜三稜針出血以瀉熱氣主治頭風頭痛頭皮腫面虛惡寒瘧寒熱汗不出鼻衄鼻涕鼻塞目眩睛痛不能遠視以細三稜針刺之宣泄諸陽熱氣無令上衝頭目按千金云鼻中息肉灸二百壯又云兼大椎灸瘧至發時令滿百壯炷如黍米又治鬼魅灸百壯又十三鬼穴此名鬼堂主百邪癲狂玉龍賦云治頭風鼻淵問神庭穴呢答神庭隔上星五分督脈足太會陰明三壯禁針治癲癇反弓張目不識人注神庭穴在上星下五分直鼻上入髮際五分發高者髮際是穴發低者加二三分督脈足太陽陽明之會三壯禁針針之令人癲狂目失明一曰灸三七壯主治發狂登高妄走風癇癲疾角弓反張