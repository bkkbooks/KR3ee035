梃其鋒微圓長四寸又按素問九針論其文皆繁稱遠引後人莫測其倪容園曾於滬上訪問針師劉云階輩僉謂古針雖有九種某等屢造總不如法用亦不靈後得真傳只用毫針及三稜針兩種毫針醫百病有手法三稜針不去鋒便出血無手法毫針去鋒遇筋筋躲逢骨骨頂取其不傷人也問造針用何材料答本草云馬銜鐵無毒以馬屬午屬火火剋金解鐵毒故用此問制針法呢答先將馬銜鐵造成鐵絲放火中煅紅次截之或二三五寸不等以蟾酥塗針上仍入火中微煅不可令紅取起照前塗蟾酥連煅三次至末次乘熱插入臘肉皮之裡肉之外將後藥先用水三碗煎沸次入針肉在內煮至水乾傾入冷水中待冷將針取出於黃土中插百餘下以去火毒次以銅絲纏其首其針鋒要磨圓不可用尖刃煮針藥列後真麝香五分膽礬一錢石斛一錢甲珠一錢川芎三錢歸尾三錢硃砂三錢沒藥三錢鬱金三錢細辛三錢草節五錢沉香一錢磁石一兩即吸鐵石問灸病用何材料答本草云艾味苦氣微溫陰中之陽無毒主灸百病丹溪云艾性至熱入藥服則下行入火灸則上行又潮州鎮軍範培蘭留心灸法因得人傳授製為藥針藥皆純正每遇風寒暑濕痼疾沉疴治無不效灸藥列後艾絨三兩硫黃二錢真麝一錢乳香沒藥松香桂枝杜仲枳殼皂甲細辛川芎獨活甲珠雄黃白芷全蠍牛黃以上十四味各一錢共為細末和勻裁定皮紙將藥鋪上厚分許層紙層藥凡三層卷緊再以桑皮紙厚糊數層以雞蛋清通刷外層勿令泄氣陰乾備用第七十一章行針法問何為行針八法答即揣爪搓彈搖捫循捻是也問何謂揣而尋之答凡點穴以手指揣摸其處在陽部筋骨之側陷者為真在陰部郤膕之間動脈相應其肉厚薄或伸或屈或平或直以法取之按而正之以左手大指爪切掐其穴於中庶得進退方有準也難經曰刺榮無傷衛者乃掐按其穴令氣散而直刺之是不傷其衛氣也刺衛無傷榮者乃撮起其穴以針臥而刺之是不傷其榮血也此陰陽補瀉之大法也問何謂爪而下之答此即針賦所謂左手重而切按欲令氣血宣散右手輕而徐入欲其不痛此乃下針之祕法也問何謂搓而轉之答如搓線之狀勿轉太緊轉者向左為補向右為瀉此即迎隨之祕法也故經曰迎奪右而瀉涼隨濟左而補暖正謂此也問何謂彈而伸之答此即先彈針頭待氣至卻進一豆許先淺而後深自外推內補針之法也問何謂搖而伸之答此乃先搖動針頭待氣至卻退一豆許乃先深而後淺自內引外瀉針之法也故又曰針頭補瀉問何謂捫而閉之答經曰凡補必捫而閉之故補於方出針時就捫閉其穴使血氣不瀉乃為真補問何謂循而通之答經曰凡瀉針必以手指於穴上四旁循之使血氣宣散方可下針故出針時不閉其穴乃為真瀉問何謂外捻內捻答凡治上大指向外捻治下大指向內捻外捻者令氣向上而治病內捻者令氣向下而治病如出針內捻者令正氣行至病所外捻者令邪氣至針下而出也此行針法八法之祕訣也問持針法呢答先將穴認真醫以左手大指甲或食指甲用力掐定右手大指次指持針刺之新針先以口溫而後刺熟針不必溫問何謂定神答當刺之時醫言勿驚虛點幾針病者不懼而後刺之醫家氣象從容目無旁視心無別營手如握虎勢若擒龍用針自無不妙問暈針治法答暈針者神氣虛也古云色脈不順而莫針並忌大風雨雪陰天及醉勞房後驚飢居喪之人容園以針刺病者不下數千而暈針不過數人但以指甲掐病者人中醒方鬆手然暈針者必獲大效以血氣交泰故也語云針不傷人又法暈針不可起針宜以別針就旁刺之用袖掩病人口鼻鼓動其氣以熱水飲之即醒良久再針或者掐病人十指甲蓋上一分肉處甚者針手膊上側筋骨陷中即蝦蟆肚肉上名醒醒穴或針足三里穴必醒其病必愈問折針治法答折針用磁石引出或用象牙末水和塗之亦出或用車脂油攤紙上如錢大貼患處日換三五次亦出或用硫黃細末調塗以紙花貼上覺癢時即出或用雙仁杏仁搗爛以鮮豬脂調勻貼上亦出倘經絡傷膿血出用耆歸肉桂木香沉香乳香研末以緑豆粉糊丸每小丸五十粒熱水吞之自愈第七十二章用灸法問何病宜用法答針之所不能為者則灸法施之又針雖捷不如灸穩如氣血兩虧年高少小之人並頭胸腹背咽喉各處均宜用灸補勿吹其火須待自減瀉速吹其火以開其孔也經曰灸不三分是謂徒然但小兒一周以內炷如雀屎可也又頭面炷須小手足可大取火用麻油點燈問灸後宜發瘡否答凡灸後瘡發其病易愈故灸瘡不發者以鞋底燒熱尉之三日即發或用赤皮蔥放炭火中煨熱拍破乘熱尉瘡上下十餘遍其瘡亦發或以生麻油漬之或用皂角煎湯頻點之亦有因血氣衰弱不發必服四物湯滋養血氣者不可一概論也要在人設法助之不可任其不發問灸瘡如何治法答古人貼灸瘡不用膏藥要使膿出多而疾除耳故春用柳絮夏用竹膜秋用新棉花冬用兔腹下白細毛或用貓腹毛亦可以上諸法均須用真麻油浸濕輕貼患處不可令其枯乾致增痛苦問灸後調攝法呢答灸後不可就吃茶水食物恐解火氣而滯經氣須少停一二時宜靜養安臥遠人事忌色欲平心靜氣凡百俱要寬解尤忌大怒大勞大飢大飽受熱冒寒生冷瓜果亦當忌之惟食清淡養胃之物使氣血流通艾火逐出病氣若貪厚味酗酒必生痰涎阻滯病氣矣至鮮魚雞羊雖能發灸但可施於初灸數日之內不可加於十日之外今人多不知調攝雖灸何益故因灸而反致害者此也徒責灸法不效何耶第七十三章補瀉法問補瀉之法各家異辭究當何如答博約不同各具其理愈轉愈深莫衷一是如內經補瀉難經補瀉神應經補瀉南豐李氏補瀉四明陳氏補瀉三衢楊氏補瀉類皆連篇纍牘令人嘆起望洋故此書於行針法章已發其凡因集隘難以備述且原文具在無需蛇足之添今將生平經驗詳著於篇以為開關救危之用按手陰從胸行於手針芒從內往下為隨針芒從外往上為迎手陽從手行於頭針芒從外往上為隨針芒從內往下為迎足陽從頭行於足針芒從內往下為隨針芒從外往上為迎足陰從足行於腹針芒從外往上為隨針芒從內往下為迎左為陽陽主進右為陰陰主退手為陽左手為純陽足為陰右足為純陰左手陽經為陽中之陽左手陰經為陽中之陰右手陽經為陰中之陽右手陰經為陰中之陰右足陰經為陰中之陰右足陽經為陰中之陽左足陰經為陽中之陰左足陽經為陽中之陽如針病者左手陽經以醫者右手大指進前呼之為隨退後吸之為迎進前即經之從外退後即經之從內如針病者左手陰經以醫者右手大指退後吸之為隨進前呼之為迎如針病者右手陽經以醫者右手大指進前呼之為隨退後吸之為迎如針病者右手陰經以醫者右手大指退後吸之為隨進前呼之為迎如針病者右足陽經以醫者右手大指退後吸之為隨進前呼之為迎如針病者右足陰經以醫者右手大指進前呼之為隨退後吸之為迎如針病者左足陽經以醫者右手大指退後吸之為隨進前呼之為迎如針病者左足陰經以醫者右手大指進前呼之為隨退後吸之為迎蓋手上陽進陰退足上陽退陰進合六經起止故也問午前補瀉與午後相反男子補瀉與女人相反何故答蓋以午前為陽午後為陰男子之氣早在上而晚在下女人之氣早在下而晚在上之故耳問呼吸男女人我皆同何亦有陰陽之判耶答蓋有自然之呼吸有使然之呼吸入針出針使然之呼吸也轉針如待貴人如握虎尾候其自然呼吸若左手足候其呼而先轉則右手足必候其吸而後轉之若右手足候其吸而先轉則左手足必候其呼而後轉之此陰陽一升一降之消息也問補瀉必資呼吸假令尸厥中風不能使之呼吸奈何答候其自然之呼吸而轉針若當吸不轉令人以手掩其口鼻鼓動其氣可也問針背面腹面呢答凡針背腹兩面穴亦分陰陽經補瀉針男子背上中行左轉為補右轉為瀉腹上中行右轉為補左轉為瀉女人背中行右轉為補左轉為瀉腹中行左轉為補右轉為瀉以男子背陽腹陰女人背陰腹陽故也問補瀉之法有以淺深言者有以虛實言者何謂也答經言春夏刺淺秋冬刺深又云從衛取氣從榮置氣蓋補則從衛取氣針宜輕淺從其衛氣隨之於後而濟益其虛也瀉則從榮置氣刺宜重深取其榮氣迎之於前而瀉奪其實也但補亦不可太實瀉亦不可過虛要當以平為度耳又凡針逆而迎奪即實則瀉其子也如心經熱病必瀉脾胃凡針順而隨濟即虛則補其母也如心經虛病必補肝膽之類是也問九數六數多少不同提針插針分寸互異何關補瀉答凡補皆用九數有用三九者有用六九者有用九九者即子陽少陽老陽之數凡瀉皆用六數有用二六者有用四六者有用六六者即午陰少陰老陰之數此補瀉之常法也至於瀉實針疾出補虛針久留以及提插捫循諸用則又補瀉之活法耳問針形至微何能補瀉答如氣球然方其未有氣也則懨塌不堪蹴踢及從竅吹之則氣滿起胖此虛則補之之義也去其竅之所塞則氣從竅出復懨塌矣此實則瀉之之義也問迎奪隨濟補瀉之義何在答迎者迎其氣之方來如寅時氣來注肺卯時氣注大腸此時肺與大腸氣盛而奪瀉之也隨者隨其氣之方去如卯時氣去肺辰時氣去大腸肺與大腸此時正虛而濟補之之類是也謹按補瀉分男女早晚其理幽深原為奇經不拘十二經常度故參互錯綜如是若流注穴仍以分左右陰陽為宜嘗憶雪心歌云如何補瀉有兩般蓋是經從兩頭髮古人補瀉陰陽分今人乃為男女別男女經脈一般生晝夜循環無暫歇此訣出自長桑君我今授汝心已雪録之以為行針定法第七十四章編輯古今針灸歌賦問玉龍歌呢答扁鵲授我玉龍歌玉龍一試起沉疴玉龍之歌真罕得流傳千載無差訛我今歌此玉龍訣玉龍一百二十穴看者行針殊妙絶但恐時人自差別補瀉分明指下施金針一刺顯明醫傴者立伸僂者起從此名揚天下知傴補曲池人中瀉僂瀉絶骨補風池中風不語最難醫髮際頂門穴要知更向百會明補瀉即時蘇醒免災危頂門上星後一寸上星髮際一寸推頂門禁針灸五壯百會七壯補瀉施鼻流清涕名鼻淵先瀉後補疾可痊若是頭風並眼痛上星穴內刺無偏頭風嘔吐眼昏花穴取神庭始不差孩子慢驚何可治印堂刺入艾還加神庭禁針二七壯印堂沿皮攢竹斜頭項強痛難回顧牙疼並作一般看先向承漿明補瀉後針風府即時安頭風偏正痛難醫絲竹金針亦可施沿皮向後透率谷一針兩穴世間稀偏正頭風有兩般有無痰飲細推觀若然痰飲風池刺痰飲均無合谷安口眼喎斜最可嗟地倉妙穴連頰車喎左瀉右依然正喎右瀉左莫令斜不聞香臭從何治迎香兩穴是堪攻先補後瀉分明效一針未出氣先通耳聾氣閉痛難言須刺翳風穴始痊亦治項上生瘰癘一針瀉動即安然耳聾之症不聞聲痛癢蟬鳴不快情紅腫生瘡須用瀉宜從聽會把針行偶爾失音言語難啞門一穴兩筋間若知此穴莫深刺言語音和照舊安眉間疼痛苦難當攢竹沿皮刺不妨若是眼昏皆可治頭維針刺更安康兩睛紅腫痛難熬怕日羞明心自焦只刺睛明魚尾穴太陽出血自然清眼痛忽然血貫睛羞明更澀最難掙須得太陽針血出不用金刀疾自平心火上炎雙眼紅迎香穴內刺為通若將毒血搐出後目內清涼始見功強痛脊背瀉人中挫閃腰疼亦可攻更有委中之一穴腰間諸病任君攻腎弱腰疼不可當施為行止甚非常若識腎俞二穴處艾灸頻加體自安環跳能治腿股風居髎二穴認真攻委中毒血更出盡愈見醫科神聖功腿膝無力身立難原因風濕致傷殘倘知二市穴能刺步履悠然漸自安環跳能醫兩腿疼膝頭紅腫不能行必針膝眼膝關穴功效須臾病不生寒濕腳氣不可熬先針三里及陰交再將絶骨穴兼刺腫痛登時立見消腫紅腿足草鞋風須把崑崙二穴攻申脈太溪如再刺神醫妙訣起疲癃腳背疼起邱墟穴斜針出血即時輕解溪再與商邱識補瀉行針要辨明行步艱難疾轉加太衝二穴效堪誇更針三里中封穴去病如同用手抓膝頭紅腫鶴膝風陽陵二穴亦堪攻陰陵針透尤收效紅腫全消見異功腕中無力痛艱難握物難移體不安腕骨一針須見效莫將補瀉等間看急疼兩臂氣攻胸肩井分明穴可攻此穴原來真氣聚補多瀉少應其中肩背風寒連臂疼背縫二穴用針明五樞亦治腰間痛得穴方知病頓輕背縫二穴在背肩端骨下直腋縫尖二寸七壯兩肘拘攣筋骨連艱難動作欠安然只把曲池針瀉動尺澤兼行見聖傳尺澤禁灸瀉針肩端紅腫痛難當寒濕相爭氣血狂若向肩髃明補瀉管君多灸自安康筋急不開手難伸尺澤從來要認真頭面縱有諸般症一針合谷便通神腹中氣塊痛難當穴法宜向內關防八法有名陰維穴腹中之疾永安康腹中疼痛亦難當大陵外關可消詳若是脅疼並閉結支溝奇妙效非常脾家之症最堪憐寒熱相爭兩苦煎間使二穴針瀉動熱瀉寒補病俱痊九般心痛及脾疼上脘穴中用神針若還脾敗中脘補兩針神效免災侵痔漏之疾亦可憎表裡急重最難禁或痛或癢或下血二白穴在掌中尋五分二七壯三焦熱氣壅上焦口苦舌乾豈易調針刺關衝出毒血口生津液病俱消手臂紅腫連腕疼液門穴內用針明更針一穴名中渚多瀉中間疾自輕中風之症症非輕中衝二穴可安寧先補後瀉如無應再刺人中立便輕膽寒心戰病如何少衝二穴最功多刺入一分不著艾金針用後自平和時行瘧疾最難禁穴法由來未審明若把後溪穴尋得多加艾火即時輕熱瀉寒補牙疼陳陳苦相煎穴在二間要得傳若患胃翻並吐食中魁奇穴莫教偏乳蛾之症少人醫必用金針疾始除如若少商出血後即時安穩免災危於今癮疹疾多般好手醫人治亦難天井二穴多著艾縱生瘰癧灸皆安灸宜瀉寒痰咳嗽更兼風列缺二穴最堪攻先把太淵一穴瀉多加艾火即收功癡呆之症不堪親不識尊卑亂罵人神門獨治癡呆病轉手骨開得穴真針灸宜瀉連日虛煩面赤妝心中驚悸亦難當若將通里穴尋得一用金針體便康虛煩瀉驚恐補風眩目爛最堪憐淚出汪汪不可言大小骨空皆妙穴多加艾火疾應痊七壯瀉之婦人吹乳痛難消吐血風痰稠似膠少澤穴中明補瀉應時神效氣能調滿身發熱痛為虛盜汗淋淋漸抽軀須得百勞椎骨穴金針一刺疾俱除忽然咳嗽腰背疼身柱由來灸便輕至陽亦治黃疸病先補後瀉效分明腎敗腰虛小便頻夜間起止苦勞神命門若得金針助腎俞艾灸起邅迍九般痔漏最傷人必刺承山效若神更有長強一穴妙呻吟大痛穴為真傷風不解咳嗽頻久不醫時癆便成咳嗽須灸肺俞穴痰多宜向豐隆針膏肓二穴治病強此穴原來難度量斯穴禁針多著艾二十一壯亦無妨腠理疏兮咳嗽頻鼻流清涕氣皆沉須知噴嚏風門穴咳嗽宜加艾火深膽寒由是怕心驚白濁遺精實不禁夜夢鬼交心俞治白環俞治一般針肝家血少眼昏花宜補肝俞力便加更將三里頻瀉動還先益血自無差脾家之症有多般食吐胃翻種切難黃疸必須尋腕骨金針一定奪中脘無汗傷寒瀉復溜汗大宜將合谷收若然六脈皆微細金針一補脈還浮大便閉結不能通照海分明在足中更把支溝來瀉動方知妙穴有神功小腹脹滿氣攻心內庭二穴要先針兩足水多臨泣瀉無水方能病不侵七般疝氣取大敦穴法由來指側間諸經具在三毛際不遇師傅隔萬山傳尸勞症最難醫湧泉出血免災危痰多須向豐隆瀉氣喘丹田亦可施渾身疼痛疾非常不定穴中細審詳有筋有骨宜淺刺灼艾臨時要度量勞宮穴在掌中尋滿手生瘡痛不禁心胸之病大陵瀉氣攻胸腹一般針喘哮之症緊難當夜間不睡氣遑遑天突妙穴宜尋得膻中著艾便安康鳩尾獨治五般癇此穴須當仔細看若然著艾宜七壯多則傷人針亦難氣喘急急不可眠何當日夜苦憂煎或得璇璣針瀉動更兼氣海自安然先瀉後補腎強疝氣發頻頻氣上攻心似死人關元兼刺大敦穴此法親傳始得真水病之疾最難熬腹臌虛脹不能消先灸水分兼水道後針三里及陰交腎氣衝心得幾時須用金針疾自除若得關元兼帶脈四海誰不仰名醫婦人赤白帶下難只因虛敗不能安中極補多宜瀉少灼艾還須著意看赤瀉白補吼哮之症嗽痰多若用金針疾自和俞府乳根同一刺氣喘風痰漸漸磨傷寒過經猶未解須向期門穴上針忽然氣喘攻胸膈三里瀉多須用心脾瀉之症別無他天樞二穴刺休差此是五臟脾虛疾艾灸多添病不加口臭之疾最可憎勞心只力苦多情大陵穴與人中瀉心得清涼氣自平穴法原來在指中治病須臾顯神通勸君要治諸般疾何不當初記玉龍問勝玉歌呢答勝玉歌兮不虛言此是楊家真祕傳或針或灸依法語補瀉迎隨隨手捻頭痛眩暈百會好心疼脾痛上脘先後溪鳩尾及神門治療五癇立便痊髀疼要針肩井穴耳閉聽會莫遲延胃冷下脘卻為良眼痛須覓清冷淵霍亂心疼吐痰涎巨闕著艾便安然脾疼背痛中渚瀉頭風眼痛上星專頭項強急承漿保牙腮疼緊大迎前行間可治膝腫病尺澤能醫筋拘攣若人行步苦艱難中封太衝針便痊腳背痛時商丘刺瘰癧少海天井邊筋疼閉結支溝穴頷腫喉閉少商前脾心痛急尋公孫委中驅療腳風纏瀉卻人中及頰車治療中風口吐沫五瘧寒多熱亦多間使大杼真妙穴經年或變勞怯者痞滿臍旁章門決噎氣吞酸食不投膻中七壯除膈熱目內紅