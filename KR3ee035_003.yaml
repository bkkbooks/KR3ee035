汁套於手指上即能消腫或用黃連蜈蚣研末雞子清調敷患處指根者患疔之指根第三節近掌處如患大指即刺大指根如患食指即刺食指余仿此背脊疔屬督脈經尾骶委中百勞靈臏骨生疔刺厲兌膝眼委中刺無害湧泉穴中百勞刺陰谷太溪為之使腳虎口中須一針前後隱珠俱可治按前後隱珠在湧泉穴之前後肉龜疔生腳背上其形似龜痛難量急用金針刺四圍艾灸疔頭可無恙附診脈要訣問切脈扼要歌呢答微茫指下最難知條緒尋來悟治絲三部分持成定法八綱易見是良規胃資水穀人根本土具沖和脈委蛇臟氣全憑生克驗天時且向逆從窺陽浮動滑大兼數陰澀沉弦弱且遲外感陰來非吉兆內虛陽現實堪悲須知偏盛皆成病忽變非常即弗醫要語不煩君請記脈書鋪敘總支離問診脈部位歌呢答左寸外心內膻中左關外肝內候膈左尺外腎內候腹此部小腸膀胱附右寸外肺內胸中右關內脾外候胃右尺外腎內候腹此部大腸命門附不言三焦之謂何上中下部分診妙問七表八里九道脈歌呢答浮按不足舉有餘芤脈中空兩畔居滑體如珠中有力實形逼滿與長俱弦如始按弓弦狀緊若牽繩轉索初洪舉按之皆極大以上七表脈須知若問八里脈何似微來如有又如無遲脈一息凡三至沉舉都無按有餘澀脈如刀輕刮竹緩脈呼吸來徐徐伏甚於沉須切骨弱脈沉微舉即無濡脈輕得重則散斯為八里之脈歟又有所謂九道者長脈流利三部敷短脈本位尚不及虛脈遲大而力柔促脈來數而急促代脈不還真可虞結脈時止而遲緩動脈鼓動無定居牢脈如弦沉更實細脈雖有膽如絲問反關脈歌呢答反關不行於寸口由肺列缺入臂側大腸陽溪上食指一手兩手非病脈問無脈候歌呢答久病無脈氣將脫暴病無脈不忌刻或因六郁或折傷關格不應斯無忒惟有肌肉大脫者九候雖調多不測問緩代脈歌呢答五十動不止身無病數內有止皆知定四十動一止一臟絶四年之後多亡命三十一止即三年二十一止二年應十動一止一年亡更觀氣色與形證問急代脈歌呢答兩動一止三四日三四動止應六七五六一止七八朝次第推之自無失問七怪脈歌呢答雀啄連連止而又作屋漏水流半時一落彈石沉弦按之指搏乍密乍疏亂如解索本息末搖魚翔相若暇遊冉冉忽然一躍釜沸空浮絶無根腳七怪一形醫休下藥肝胃腎脾心腸肺絶問婦科診脈歌呢答婦人之脈尺大於寸尺脈澀微經愆定論三部如常經停莫恨尺若有神得胎如應婦人有胎亦取左寸若知神門占之不遁月斷病多六脈不病體弱未形有胎可慶婦人停經脈來滑疾按有散形三月可必按之不散五月是實和滑而代二月為率婦人有孕尺內數弦內奔血下革脈亦然將産之脈名曰離經內動胎氣外變脈形新産傷陰出血不止尺不上關十有九死尺弱而澀腸冷惡寒年少得之受奶良難年大得之絶産血乾問小兒驗紋按額診脈歌呢答五歲以下脈無由驗食指三關脈絡可見熱現紫紋傷寒紅像青驚白疳直同影響隱隱淡黃無病可想黑色曰危心為怏怏若在風關病輕勿忌若在氣關病重留意若在命關危急須記脈紋入掌內鉤之始彎里風寒彎外積滯五歲以上可診脈位指下推求大率七至加則火門減則寒類余照脈經求之以意更有變蒸脈亂身熱不食汗多或吐或瀉原有定期與病有別疹痘之初四肢寒微面赤氣粗涕淚弗輟半歲小兒外候最切按其額中病情可晰外感於風三指俱熱內外俱寒三指冷冽上熱下寒食中指熱設若夾驚名中指熱設若食停食指獨熱問八大綱脈歌呢答浮為主表屬腑屬陽輕手一診形象象彰浮而有力洪脈火揚浮而無力虛脈氣傷浮而虛甚散脈靡常浮如蔥管芤脈血殃浮如按鼓革脈精亡浮而柔細濡脈濕妨浮兼六脈疑似當詳沉為主裡屬臟屬陰重手尋按始了於心沉而著骨伏脈邪深沉而砥硬牢脈寒淫沉而細軟弱脈虛尋沉兼三脈須守規針遲為主寒臟病亦是三至二至數目可擬遲而不愆緩脈最美遲而不流澀脈血痞遲而偶停結脈郁實遲止定期在三四至中代脈多死遲兼四脈各有條理數為主熱腑病亦同五至以上七八人終數而流利滑脈痰朦數而牽轉緊脈寒攻數而有止促脈熱烘數見於關動脈崩中數見四脈休得朦朧緊者熱為寒束細主諸虛蛛絲其象脈道屬陰病情可想細不顯明微脈氣殃細而小浮濡脈濕長細而小沉弱脈失養細中之脈須辨朗朗大主諸實形闊易知陽脈為病邪實可思大而湧沸洪脈熱司大而堅硬實脈邪持大兼二脈病審相宜短主素弱不由病傷上下相準縮而不長諸脈兼此宜補陰陽動脈屬短治法另商多為酒食所傷長主素強得之最罕上魚入尺迢迢不短正氣之至長中帶結若是陽邪指下湧沸中見實脈另有餘款多為陽明熱鬱
