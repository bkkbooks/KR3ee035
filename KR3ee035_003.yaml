之名正見任脈為心包行血也從膻中上行三寸二分陷中為紫宮穴紫宮指心而言也心應洛書九紫離卦故名紫宮任脈至此正內合於心故以心位名之正見任脈為心行血之統脈也又上室唇下為承漿穴與督脈會而任脈終其支者循面而至於眼下細觀任督之起止而知督脈主陽主氣任脈上陰主血互相貫通為人身之總司也督脈起於腎中下至胞室腎中天一所生之癸水入於胞中全在督脈導之使下腎氣至胞任脈應之則心胃之血乃下會於胞中此為任督相交心腎相濟道家坎離水火交媾之鄉即在於此督脈絡陰器循二陰之間與任脈會於下也貫脊上頂交於人中與任脈會於上也今細察其脈由鼻柱上腦貫脊抵腎由腎入胞中據此道路觀之乃知督脈主陽主生腎氣蓋氣生於天陽吸於鼻孔至腦門下肺管循背脊而下入腎又由腎入胞中故吸入則胞中滿也吸入之氣實由鼻由腦由脊而下故掩鼻張口能出氣而不能吸氣蓋吸由脊下非從鼻腦不能入也呼由膈出故張口能出氣也吸由脊下督脈主之知督脈之所主乃知氣之生化也督脈起於胞中出會陰穴至尾閭骨端名長強穴上至二十一椎名腰俞是腰腎筋膜所聯也再上十四椎當腎正中為命門穴乃腎繫著脊之處為督脈之主蓋任是心血所司督是腎氣所司故命門為督脈之主穴也又上至第三椎為身柱穴肺腎相交為一身元氣之宰故稱為柱再上大椎於髮際一寸宛中為風府發上二寸五分為腦戶即西醫腦後葉之中縫也至顛頂為百會穴與肝脈交會於此前行當囟門為囟會穴謂心神上照於髓以發知覺即與髓會之所也又至額上髮際為神庭穴亦是心神上出於此之義下至鼻準至齒縫齦交穴而終蓋人身吸天陽入鼻循脊下腎系而入丹田總歸督脈所主化氣化精為人生命之原總督周身臟腑故稱督也帶脈當腎十四椎出屬帶脈圍身一周前垂至胞中帶胞總束諸脈使不妄行如人束帶故名究帶脈之所從出則貫腎系是帶當屬腎女子一胞全賴帶脈主之蓋以其根結於命門也環腰貫脊居於身之中停又當屬之於脾故脾病則女子帶下以其屬脾而又垂於胞門故隨帶而下也帶脈後在十四椎當腎之中前在臍繞腰一通帶脈一穴則在季肋當少陽部位近圖帶脈三穴一帶脈穴在足少陽膽經季肋之下一寸八分再下三寸為五樞穴又下為維道穴似帶脈繞行三匝而有上中下三穴也然難經云帶脈後起於季肋回身一周無三匝之説又靈樞經曰足少陰脈別走太陽至十四椎屬帶脈後人遂以帶為腎之別脈非也屬帶脈者謂其為帶脈所管束非言帶脈是腎之脈也因穴居少陽之界以為少陽脈者亦非也肝膽能為帶脈之病然帶脈終非肝膽之脈蓋帶主管束前後前束任而經心小腸之臍中後束督而經腎系之中人生惟脾主中州交合水火帶脈適當腰腹之中應歸為脾之脈也其穴在脅亦以前不居任位後不居督位正見其管束前後也或疑帶脈不與脾連豈知腹中膜油皆脾之物腎著湯治帶脈以脾為主女科以婦人帶衣皆歸於脾良有以也按督脈在背總統諸陽屬先天任脈在腹總統諸陰屬後天衝脈麗於陽明而通於胞宮由後天以交於先天腎者也帶脈出於腎中以周行脾位由先天以交於後天脾者也四者互為工用不可不詳究焉第三十九章經外奇穴名目主治問內迎香二穴呢答在鼻孔中治火眼暴痛用蘆管子搐出血即愈問鼻準穴呢答在鼻柱尖上專治鼻上酒醉風三稜針出血問耳尖穴呢答在兩耳尖上卷耳取治眼生翳膜用小艾炷五壯問聚泉穴呢答在舌上當中吐出舌中直有縫陷中是穴治哮喘咳嗽久嗽不愈七壯灸法用生薑切片搭於穴中灸之熱嗽用雄黃和艾炷冷嗽用冬花末和艾炷灸後用清茶連生薑細嚼咽下並治舌苔舌強用小針出血問金津玉液二穴呢答在舌下兩旁紫筋上是穴捲舌取之治重舌腫痛三稜針出血問魚腰穴呢答在眉毛中間治眼生垂簾翳膜針入一分沿皮向兩旁問海泉穴呢答在舌下中央脈上治消渴用三稜針出血一云禁針問太陽穴呢答在眉後陷中紫脈上治眼紅腫及頭痛用三稜針出血其法以手緊扭其領脈即現於脈上刺出血極效問大骨空呢答在手大指中節上屈指當骨尖陷中治目久痛及生翳膜目障七壯問中魁穴呢答在中指第二節骨尖屈指得之治五噎反胃吐食七壯瀉之問八邪八風穴呢答在手五指歧骨間左右手各四穴名八邪兩足共八穴名八風問大都穴呢答在虎口赤白肉際握拳取之治頭風牙疼七壯一分問上都穴呢答在手食指本節後歧骨間握拳取之治手背紅腫二分五壯問中都穴呢答在手無名指本節後歧骨間主治同上問下都穴呢答在手小指本節後歧骨間主治同上問十宣穴呢答在手指頭上去爪甲一分每指各一穴治乳蛾以三稜針出血問五虎穴呢答在手兩食指及兩無名指第二節骨尖握拳取之治五指拘攣五壯問肘尖穴呢答在兩手肘骨尖上屈肘得之治瘰癧可灸七七壯問肩柱骨呢答在肩端起骨尖上治瘰癧及手不舉七壯問二白穴呢答在掌後橫紋中直上四寸一手兩穴一在大筋內間使穴後一寸一在大筋外二穴相併治痔脫肛問獨陰穴呢答在足二指下橫紋中治小腸疝氣又下死胎胞衣噦嘔吐血月經不調五壯問內踝尖呢答在足內踝骨尖治下片牙疼腳轉筋七壯問外踝尖呢答在足外踝骨尖治腳氣寒外廉轉筋以三稜針出血問囊底穴呢答在陰囊一字紋中治腎臟風聞及小腸疝氣腎家一切症候七壯艾如鼠屎問鬼哭穴呢答在手足大拇指去爪甲角如韭葉兩指並起用帛縛之當兩指岐縫中是穴治五癇等症正發時灸之甚效鬼哭或作鬼眼非鬼眼乃腰眼穴也鬼哭謂鬼邪哭而求自去之意問競骨穴呢答在梁邱穴兩旁各開寸半兩足共四穴治腿