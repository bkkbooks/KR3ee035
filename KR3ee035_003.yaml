功傷寒一日調風府少陽二穴風池取三五七日病過經依此針之無不應心疼嘔吐上脘宜豐隆兩穴更無疑蛔蟲並出傷寒病金針直刺顯明醫男子痃癖取少商女子血氣陰交當虛汗盜汗須宜補委中妙穴可傳揚項強腫痛屈伸難體重還兼腰背癱束骨更加三里刺教君頃刻便開顏脊因閃挫腰難轉舉動多艱步履難腰背連臍痛不休手中三里穴堪求神針未出急須瀉得氣之時不用留小腹便澼最難醫間使針同氣海宜中極也同三里刺須明補瀉察毫釐問玉龍賦呢答夫博參以為約要輯簡而舍繁總玉龍以成賦信金針而獲安原夫卒暴中風項門百會連延腳氣里絶三交頭風鼻淵上星可取耳聾腮腫聽會偏高攢竹頭維治目疼頭痛乳根俞府療氣嗽痰哮風市陰市驅腿腳之乏力陰陵陽陵除膝腫之難熬膏肓補虛損大敦除疝氣痔漏須尋二白痃瘧當求間使天井醫瘰癧癮疹神門治癲癇失意咳嗽風痰太淵列缺宜刺尫羸喘促璇璣氣海當知期門大敦能治堅痃疝氣勞宮大陵可療心悶瘡痍心悸虛煩刺三里時疫痃瘧尋後溪絶骨三里陰交腳氣宜此睛明太陽魚尾目症宜之老者便多命門兼腎俞著艾婦人乳腫少澤於太陽可推身柱蠲嗽能除膂痛至陽卻疸善治神疲長強承山灸痔最妙豐隆肺俞痰嗽稱奇風門主傷冒寒邪之嗽天樞理感患脾泄之危風池絶骨而療乎傴僂人中曲池可治其痿僕期門刺傷寒未解經不再傳鳩尾針癇癲已發慎其妄施陰交水分三里臌脹宜刺商丘解溪丘墟腳氣堪追尺澤理筋急之不用腕骨療手腕之難移肩脊痛兮五樞兼於背縫肘攣疼兮尺澤合於曲池風濕搏於兩肩肩髃可療壅熱盛於三焦關衝最宜手臂紅腫中渚液門要辨脾虛黃疸腕骨中脘何疑傷寒無汗攻復溜宜瀉傷寒有汗取合谷當隨欲調飽滿之氣逆三里可勝要起六脈之沉匿復溜稱奇照海支溝通大便之祕內庭臨泣理小腹之䐜天突膻中喘嗽者當覓地倉頰車口喎者宜尋迎香攻鼻窒為最肩井除臂痛難擎二間治牙疼中魁理翻胃而即愈百勞止虛汗通里療心驚而即寧大小骨空治眼爛能止冷淚左右太陽除血翳兩目不明心俞腎俞治腰痛腎虛之夢遺人中委中除腰脊閃痛之難制太溪崑崙申脈最療足腫之迍湧泉關元豐隆為治尸勞之例印堂可治驚搐神庭專理頭風大陵人中頻瀉口氣全去帶脈關元多灸腎敗堪攻腳腿腫疼針環跳膝眼行步艱楚灸三里中封取內關於照海醫腹疼之塊搐迎香於鼻內消眼熱之紅肚疼結閉大陵合外關於支溝腿風濕痛居髎兼環跳於委中上脘中脘治九種之心痛赤帶白帶求中極之異同又若心虛熱壅少衝明其濟奪目昏血溢肝俞辨其實虛慕心傳之玄祕究手法之疾除或值挫閃疼痛之不定此為難擬俞穴之莫拘輯管見以便讀幸高明無哂諸問靈光賦呢答黃帝岐伯針灸訣依他經里分明説三陰三陽十二經更有兩經分八脈靈光典注極幽深偏正頭疼瀉列缺睛明治目胬肉攀耳聾氣閉聽會間兩鼻鼽衄針禾髎鼻窒不聞迎香專滯氣上壅足三里天突宛中治喘痰心痛手顫針少海少澤應除心下寒兩足拘攣覓陰市五般腰痛委中安髀樞疼痛丘墟瀉復溜治腫效如神犢鼻能療風邪濕止喘腳氣刺崑崙後跟痛在僕參求轉筋久痔承山居足掌下去尋湧泉妙法千金莫妄傳此穴多治婦人疾男蠱女孕兩能痊百會龜尾治痢疾大小腸俞大小便氣海血海五淋取中脘下脘治腹堅傷寒過經期門愈氣刺兩乳求太淵大敦二穴主偏墜水溝間使治邪癲吐血定喘補尺澤地倉能止口流涎勞宮醫得身勞倦水腫水分灸即安五指不便中渚取頰車可針牙齒疼陰蹺陽蹺兩踝邊腳氣四穴先尋取陰陽陵泉亦主之陰陽二蹺和三里諸穴一般治腳氣在要玄機宜正取膏肓豈止治百病灸得精良病俱愈針灸一穴數病除學者尤宜加仔細針分補瀉明呼吸穴應五行順四時欲解人身中造化此歌端的是筌蹄問席弘賦呢答凡欲行針須審穴要明補瀉迎隨訣胸背左右不相同呼吸陰陽男女別氣刺兩乳求太淵未應之時瀉列缺列缺頭疼及偏正重瀉太淵無不應耳聾氣閉聽會針迎香穴瀉功如神天突可治喉風症虛喘須尋三里中手連肩脊痛難忍合谷針時又太衝曲池兩手不如意合谷下針宜仔細心痛手顫少海間若要除根覓陰市但患傷寒兩耳聾耳門聽會疾如風五般肘痛尋尺澤冷淵針後卻收功手足疼痛針三里食癖氣塊憑此取鳩尾能治五般癇若下湧泉人不死胃中有積刺璇璣三里功多人不知陰陵泉治心胸滿針到承山飲食思大杼若連長強尋小腸氣痛即行針委中專治腰間痛腳膝腫時刺至陰氣滯腰疼不能立橫骨大都堪救急氣海專能治五淋更針三里隨呼吸期門穴主傷寒患七日過經猶未汗但向乳根二肋間又治婦人生産難耳內蟬鳴腰欲折膝下明存三里穴若能補瀉五會間且莫向人容易説睛明治眼未效時合谷光明安可缺人中治癲功最高十三鬼穴不須饒水腫水分兼氣海皮內隨針氣自消冷嗽先宜補合谷卻須針瀉三陰交牙痛腰疼並咽痹二間陽溪疾怎逃更有三間腎俞妙善除肩背及風勞若針肩井須三里不刺之時氣未調最是陽陵泉一穴膝間疼痛用針高委中腰痛腳攣急取得其經血自調腳疼膝腫針三里懸鐘二陵三陰交更向太衝須引氣指頭麻木自輕飄轉筋目眩針魚際承山崑崙立便消肚疼須是公孫妙內關相應如吹毛冷風冷痹疾難愈環跳腰俞針用燒風府風池尋得到傷寒百病絶根苗陽明二日尋風府嘔吐休言上脘遙婦人心痛豐隆穴男子癥痃三里高小便不禁關元好大便閉澀大敦燒腕骨腿疼三里瀉復溜氣滯便離腰從來風府最難針須用工夫度淺深倘若膀胱氣未散更宜三里穴中尋若逢七疝和陰痛陰交照海曲泉針仍不應時求氣海關元同瀉更如神小腸氣結痛連臍速瀉陰交莫待遲良久湧泉針取氣此中玄妙豈人知小兒脫肛患多時先灸百會次尾骶久患傷寒肩背痛但針中渚得其宜肩上痛連臍不休手中三里更須求下針麻重即須瀉得氣之時不用留問百證賦呢答百證俞穴再三用心囟會連於玉枕頭風療以金針懸顱頷壓之中偏頭痛止強間豐隆之際頭痛難禁原夫面腫虛浮須仗水溝前頂耳聾氣閉全憑聽會翳風面上蟲行迎香可取耳中蟬噪聽會堪攻目眩兮支正飛揚目黃兮陽綱膽俞攀睛攻少澤肝俞淚出刺臨泣頭維眼中漠漠即尋攢竹三間目視䀮䀮急取養老天柱雀目肝氣睛明行間而細推項強傷寒溫溜期門而可主廉泉中衝舌下腫痛堪取天府合谷鼻中衄血宜追耳門絲竹空治牙疼於頃刻頰車地倉正口於片時喉痛兮液門魚際轉筋兮金門丘墟陽谷俠溪頷腫口噤並治少商曲澤血虛口渴同施通天去鼻塞無聞之苦復溜祛舌乾口燥之悲啞門關衝舌緩不言為要緊天鼎間使失音囁嚅之休遲太衝瀉唇喎以速愈承漿住牙疼而即移項強多惡風束骨相連於天柱熱病汗不出大都更接於經渠且如兩臂頑麻少海就傍於三里半身不遂陽陵遠達於曲池建里內關掃盡胸中之苦悶聽宮脾俞祛除心下之悲悽胸脅痛疼氣戶華蓋有驗腹內腸鳴下脘陷谷能平膈疼蓄飲巨闕膻中宜取胸脅肢滿章門不用細尋痞滿更加噎塞中府能治胸膈停留瘀血腎俞當行膈滿項強神藏璇璣已試背連腰痛白環委中堪攻脊強兮水道筋縮目眩兮顴髎大迎痙病非顱息不愈臍風必然谷方瘳委陽天池腋腫針而即散後溪環跳腿疼刺之即輕夢魘不寧厲兌相諧於隱白發狂奔走上脘同起於神門驚悸怔忡取陽溪解溪勿誤反張悲哭仗天衝大橫須精癲疾取本神身柱發熱仗曲池少衝濕熱濕寒下髎定厥熱厥寒湧泉清寒栗惡寒二間疏通陰郤暗煩心嘔吐幽門開徹玉堂明行間湧泉主消渴之腎竭陰陵水分去水腫之臍盈勞瘵傳尸趨魄戶膏肓之路中邪霍亂尋陰交三里之程治疸消黃向後溪勞宮而看倦言嗜臥往通里大鐘而行咳嗽連聲肺俞須迎天突穴小便赤澀兌端獨瀉太陽經刺長強與承山善主腸風新下血針三陰與氣海專司白濁久遺精且如肓俞橫骨瀉五淋陰郤後溪治盜汗脾虛谷以不消脾俞膀胱俞覓胃冷食而難化魂門胃俞堪尋鼻痔必取齦交癭氣須求浮白大敦照海患寒疝而善蠲五里臂臑生瘰癧而能愈至陰屋翳治遍身風癢之疼多肩髃陽溪消肌腠癮風之熱極婦人經事改常自有地機血海女子少氣漏血不無交信合陽帶下産崩衝門氣衝宜審月潮違限天樞水泉細詳肩井乳癰而極效商邱痔漏而尤良脫肛趨百會尾骶之所無子收陰交石關之鄉中脘主乎積痢外丘收乎大腸寒瘧兮商陽太溪驗痃癖兮衝門血海強夫醫乃人之司命非智士而莫為針又理之玄微須高人之指教先究其病源後詳其穴道隨手見功應針取效摘録治症要訣問中風不語不省人事當取何穴答人中承漿印堂啞門中衝百會問中風口眼喎斜半身不遂當取何穴答人中承漿地倉頰車風府合谷曲池肩髃足三里風市陽陵泉陽輔絶骨丘墟崑崙肩井環跳陰市問偏正頭風眉間疼痛當取何穴答絲竹攢竹風池風府頭維列缺合谷百會問目生翳膜及內障外障當取何穴答睛明瞳髎大骨空小骨空拳尖合谷足三里光明問迎風冷淚攀睛胬肉當取何穴答絲竹攢竹大骨空拳尖小骨空睛明陽白臨泣合谷問火眼暴痛怕日羞明當取何穴答太陽睛明攢竹絲竹內迎香合谷問鼻流清涕及不聞香臭當取何穴答迎香禾髎上星人中風府風池風門百會問鼻息鼻鼽鼻衄鼻瘡當取何穴答迎香禾髎內關外關少商中衝關衝問舌腫難言口內生瘡當取何穴答廉泉玉液金津天突少商海泉承漿人中合谷問牙齒疼痛口臭難聞當取何穴答二間三間合谷承漿金津玉液大陵大迎人中問耳聾耳鳴聤耳生瘡當取何穴答合谷翳風聽會頰車耳門聽宮腎俞足三里和髎下關問頭項強痛頸難回顧當取何穴答人中承漿風府風池啞門扶突天窗天容翳風問肩臂痠疼腫脹麻木拘攣當取何穴答肩髎肩井肩髃臑會背縫五里曲池尺澤合谷問肘腕骨疼手背紅腫當取何穴答天井肘髎曲池尺澤曲澤支正外關陽池後溪中渚腋門合谷上都問五指拘攣疼痛捉物不得當取何穴答陽池腕骨後溪中渚腋門合谷八邪上都問胸腹疼痛脅肋脹滿當取何穴答上脘中脘天樞關元章門內關外關支溝內庭足三里問腿膝無力痠痛拘攣風寒濕痹屈伸維艱當取何穴答環跳居髎風市陽陵泉曲泉委中足三里問腳背紅腫步履艱難當取何穴答委中承山絶骨足三里三陰交丘墟商邱照海崑崙太溪申脈臨泣問腰脊強痛挫閃骨疼當取何穴答人中委中中髎居髎承山崑崙問腎敗腰痛不可俯仰當取何穴答腎俞命門中髎交信足三里太溪崑崙問渾身浮腫肚腹蠱脹當取何穴答曲池合谷中渚液門足三里行間三陰交臨泣崑崙太溪氣海關元問小便不通小便滑數當取何穴答陰陵泉陰谷氣海三陰交數滑命門腎俞問大便閉結及大便泄瀉當取何穴答支溝照海章門泄瀉中脘天樞氣海中極內庭足三里問赤白痢疾裡急後重當取何穴答內庭天樞隱白照海關元內關足三里問久痔脫肛腸風下血當取何穴答二白長強承山承筋脾俞問寒熱瘧疾日久不愈當取何穴答內關照海復溜間使後溪曲池合谷百勞絶骨問哮喘咳嗽吐唾痰沫當取何穴答雲門氣戶俞府璇璣天突膻中乳根氣海關元肺俞膏肓腎俞風門足三里豐隆問吐血內傷肺癰咳嗽當取何穴答膻中中脘氣海乳根支溝足三里肺俞腎俞肝俞心俞開元大陵問傳尸骨蒸癆瘵羸瘦當取何穴答膻中中脘肺俞膏肓中極湧泉百會足三里鳩