body:
  text: 贈跋余初不識譚先生為何如人也一見於長沙之湘報館再見於湘省之南學會維時往來酬酢者若康南海若梁新會若譚瀏陽諸君子僉謂容園譚志光先生者乃長邑名儒精研醫學者也余方以不談醫道而忽略之迨遲之又久至民國五年復相會於船山學社時則有若廖君笏唐任君壽國彭君少湘林君特生諸善士坐起而喧譁曰譚容園先生者素以針灸之學啟振醫林拯救人命者也余始驚其專心慈善而歎服之今觀所著針灸問答根據軒岐探源華扁鴻篇鉅製繼往開來殊令人為譚先生惜又轉為譚先生幸也惜者何惜此書之不逢盛世不得宣傳國史榮膺褒獎也幸者何幸此書之倡明絕學猶得昭示來茲流傳中外也余雖不精是科亦樂得綴數言以書其後時在民國十六年夏月秉三弟熊希齡謹跋
