入之口即在連綱油膜中也中國人見牲畜已死膀胱油膜收縮不見竅道遂謂膀胱有下口無上口疏漏之至西醫此說誠足罵盡今醫然持此以薄古聖則斷斷不可蓋內經已明言下焦當膀胱上口又言三焦者決瀆之官水道出焉內經所謂三焦即西醫所謂連綱油膜是也故焦字從瞧後人改省作焦乃不知為何物矣溺出膀胱實則三焦主之而膀胱所主者則在於生津液腎中之陽蒸動膀胱之水於是水中之氣上升則為津液氣著於物仍化為水氣出皮毛為汗氣出口鼻為涕為唾遊溢臟腑內外則統名津液實由腎陽蒸於下膀胱之水化而上行故曰腎合膀胱而膀胱為腎生津液之府也按膀胱與連綱相接處即是入水道子宮在膀胱後男子名為丹田腎陽入丹田蒸水則化氣上行膀胱如釜中蓄水丹田如灶里添薪膀胱下口曲而斜上以入陰莖溺能射出者則又肺氣注射之力也第十七章足少陰腎經穴歌注問腎經左右共五十四穴系何名在何處主治何病答湧泉屈足卷指取足心陷中白肉際腎井木穴分壯三主治回陽屍厥疾注湧泉穴在足心陷中屈足卷指宛宛中白肉際跪取腎井木穴三壯五分主治屍厥面黑如炭喘咳唾血目䀮䀮無所見善恐惕惕如人將捕之舌乾喉腫氣逆心痛黃疸腸澼股內後廉痛痿厥嗜臥善悲小腹極痛足脛寒逆腰痛便難心中結熱風疹風癇飢不能食失音喉痹賁豚等症問然谷穴呢答然谷踝前大骨下滎水之穴分壯三主治咽腫心恐懼婦人經病小兒殃注然谷穴在足內踝前大骨下陷中腎滎水穴也三分三壯主治咽腫不能納唾又不能出唾恐懼如人將捕之涎出喘呼少氣足跗腫不得履地寒疝小腹脹上搶胸脅咳嗽唾血喉痹淋瀝白濁胻酸不能久立足一寒一熱舌縱煩滿消渴自汗盜汗痿厥洞泄心痛如椎刺男子精泄婦人無子小兒臍風口噤等症問太谿穴呢答踝後跟上是太谿輸土之穴三壯分主治心痛如椎刺疝氣牙疼病屬陰注太谿穴在足內踝後五分跟骨上動脈陷中腎輸土穴也三壯三分主治久瘧咳逆心痛如椎刺脈沉手足寒至節嘔吐痰涎口中如膠善噫寒疝熱病汗不出默默嗜臥溺黃便難咽腫唾血痃癖腹脅痛傷寒手足厥冷牙齒痛等症問大鐘穴呢答溪下五分尋大鐘大骨之上兩筋中足少陰絡三分壯主治癃閉腰脊疼注大鐘穴在足跟後踵中太谿下五分足少陰絡三分三壯主治嘔吐胸膈喘息腹滿便難腰脊痛少氣淋瀝多寒欲閉戶善驚不樂舌乾咽枯等症問水泉穴呢答水泉溪下一寸許四壯四分何病治主治近視目䀮䀮女人經病腹中刺注水泉穴在太谿下一寸四壯四分主治目䀮䀮不能遠視女子經病腹中痛等症問照海穴呢答照海內踝下四分前後有筋陰蹺生五壯四分主何治癇病夜發此穴尋注照海穴在足內踝下四分前後有筋陰蹺脈生五壯四分主治咽乾心悲不樂四肢懈惰久瘧卒疝嘔吐嗜臥中風默默不知所痛視如見星小腹痛婦女經逆等症潔古曰癇病夜發灸陰蹺照海穴晝發灸陽蹺申脈穴是也問復溜穴呢答復溜踝後上二寸腎經金穴分壯三主治傷寒瘧疾病腸癖血痔小便難注復溜穴在足內踝上二寸筋骨動脈陷中腎經金穴也五壯三分主治腸癖腰脊內引痛不能俯仰起坐目視䀮䀮善怒多言舌乾胃熱蟲動涎出足痿不收履胻寒不自溫腹中雷鳴腹脹如鼓四肢腫五種水病青赤黃白黑青取井赤取滎黃取輸白取經黑取合血痔泄後腫五淋小便如散火骨寒熱盜汗汗出不止齒齲脈微細不見或時無脈等症問交信穴呢答溜前筋骨取交信三壯四分主何病癃閉㿉疝與氣淋女子血漏及經病注交信穴在足內踝骨上二寸復溜前三陰交後筋骨間取之三壯四分主治氣淋㿉疝赤白痢癃閉股樞內痛大小便難女子血漏陰挺出經不調等症問築賓穴呢答築賓六寸腨分上屈膝取之分壯三主治㿉疝癲狂病嘔吐涎沫腨痛難注築賓穴在足內踝上六寸腨分中五壯三分主治㿉疝小兒胎疝痛不能食乳癲狂妄言怒罵吐舌嘔吐涎沫足腨痛等症問陰谷穴呢答陰谷膝輔屈膝探大筋之下小筋上腎合水穴三分壯主治陰痿與腹脹注陰谷穴在膝內輔骨後大筋下小筋上動脈屈膝乃得腎合水穴也三壯四分主治膝痛如錐不得屈伸舌縱涎下煩逆溺難小便急引陰痛陰痿股內廉痛婦人漏下不止腹脹滿不得息男子如蠱女子如娠等症問橫骨穴呢答橫骨大赫下一寸禁針三壯何病治陰器引痛便五淋虛竭失精內眥赤注橫骨穴在大赫下一寸陰上橫骨中有陷如仰月曲骨外一寸三壯禁針主治五淋小便不通陰器引痛小腹滿目赤痛從內眥始五臟虛竭失精等症問大赫穴呢答大赫氣穴下一寸去腹中行一寸尋五壯三分醫何病男主陰縮女帶淋注大赫穴在氣穴下一寸去腹中行各一寸五壯三分主治虛勞失精男子陰器結縮莖中痛目赤痛從內眥始婦人赤帶等症問氣穴穴呢答氣穴四滿下一寸左名氣穴右子戶五壯三分何病治奔豚氣上腰脊痛注氣穴穴在四滿下一寸左名氣穴右名子戶一名胞門去腹中行各一寸五壯三分主治賁豚氣上引腰脊痛泄痢不止目赤痛從內眥始婦人經不調等症問四滿穴呢答四滿中注下一寸五壯三分主何病積聚疝瘕腸澼寒月經不調腹絞痛注四滿穴在中注下一寸去腹中行各一寸五壯三分主治積聚腸癖大腸有水臍下切痛振寒目內眥赤痛婦人經不調惡血絞痛奔豚等症問中注穴呢答中注肓俞下一寸去腹中行一寸論五壯一寸何病治便燥眥赤腰脊疼注中注穴在肓俞下一寸去腹中行各一寸五壯一寸主治小腹熱大便堅燥腰脊痛目內眥赤痛女子經病等症問肓俞穴呢答肓俞商曲下二寸平神闕外一寸尋五壯半寸主何病腹中積聚目赤疼注肓俞穴在商曲下二寸平神厥各開一寸五壯半寸主治腹切痛寒疝大便燥結腹滿心寒目赤痛從內眥始等症問商曲穴呢答商曲石關下一寸去腹中行寸五分五壯五分主何病腹中積聚目赤疼注商曲穴在石關下一寸去腹中行各寸半五壯五分主治腹痛腹中積聚時切痛腸中痛不嗜食目赤痛從內眥始等症問石關穴呢答石關陰都下一寸去腹中行各寸半五壯五分何病治噦嘔腹疼便淋患注石關穴在陰都下一寸去腹中行各寸半五壯五分主治噦噫嘔逆腹痛氣淋小便黃大便不通心下堅滿脊強不利多唾目赤痛從內眥始婦人無子臟有惡血血上衝腹痛不可忍等症問陰都穴呢答陰都通谷下一寸去中寸半分壯三主治瘧疾心煩滿脅熱腹脹目赤探注陰都穴一名食宮在通谷下一寸去腹中行各寸半三壯三分主治寒熱瘧疾心下煩滿腸鳴腹脹氣搶脅下痛目赤痛從內眥始等症問通谷穴呢答通谷幽門下一寸去腹中行寸半尋三壯三分主何病喑喎痃癖目赤疼注通谷穴在幽門下一寸去腹中行各寸半三壯三分主治口喎飲食喜嘔暴喑不能言痃癖胸滿食不化心神恍惚目赤痛從內眥始等症問幽門穴呢答幽門巨闕旁寸半五壯五分主何病小腹脹滿嘔吐煩泄利膿血目眥患注幽門穴在巨闕旁寸半五壯五分主治小腹脹滿嘔吐涎沫喜唾心下煩悶不嗜食裡急泄利膿血目赤痛從內眥始女子心痛氣逆喜吐飲食不下等症問步廊穴呢答步廊神封下寸六去胸中行二寸居仰取五壯三分刺胸脅臂痛喘息醫注步廊穴在神封下寸六分去胸中行各二寸仰取五壯三分主治胸脅支滿痛引胸鼻塞不通呼吸少氣咳逆嘔吐不嗜食臂不得舉等症問神封穴呢答神封靈墟下寸六五壯三分何病醫主治胸滿不得息咳嘔乳癰灑淅奇注神封穴在靈墟下一寸六分陷中去胸中行各二寸仰取五壯三分主治胸滿不得息咳逆乳癰灑淅嘔吐惡寒不嗜食等症問靈墟穴呢答靈墟神藏一寸六五壯三分何病醫主治胸腹支滿痛咳逆嘔吐食不思注靈墟穴在神藏下一寸六分五壯三分主治胸腹支滿痛引脅下咳逆嘔吐不嗜食等症問神藏穴呢答神藏彧中下寸六五壯四分何病屬主治嘔吐咳逆殃胸滿不食氣喘促注神藏穴在彧中下一寸六分五壯四分主治咳喘不得息嘔吐胸滿不嗜食等症問彧中穴呢答彧中俞府下寸六五壯四分主治同咳逆喘息食不下胸脅支滿涎唾從注彧中穴在俞府下一寸六分五壯四分主治咳逆喘不能息食不下胸脅支滿涎出多唾等症問俞府穴呢答俞府璇璣旁二寸氣舍之下仰取正三壯四分何病醫主治嘔逆脹喘症注俞府穴在璇璣旁二寸氣舍下仰取三壯四分主治咳逆上氣嘔吐喘咳腹脹不下飲食胸中痛久喘灸七壯效第十八章腎經解說問腎經解說呢答太陽經終足小指之外少陰經即起足小指之下以見一表一里相趨應也起足心循內踝太陽行外踝少陰行內踝上股貫脊屬腎絡膀胱臟與腑所以交通循喉嚨者腎上連肺聲音出於肺而生於腎也挾舌本者腎主液所以出於口也其支者出絡心以見心腎相交坎離互濟之義耳湧泉穴為腎脈極底最忌瘡漏泄氣太谿在內踝後足跟骨上此處有動脈內經皆以為診凡病且死此脈不絕者尚可救活陰谷穴在膝內側輔骨之際又上股入小腹絡膀胱循臍旁一寸名肓俞穴謂肓膜之要會在此也上絡心循喉嚨挾舌本雖不列穴名而腎經之主化在絡心循喉挾舌處為尤多舌下廉泉尤津道之要也又腎開竅於二陰前陰是膀胱下口主出溺膀胱者腎之府也腎主水化氣化水從前陰而出故前陰系腎之竅又前陰有精竅與溺竅相附而各不同溺竅內通於膀胱精竅則內通胞室女子受胎男子藏精之所尤為腎之所司故前陰有病溺竅者有病精竅者不可不詳辨也後陰是大腸下口宜屬脾胃然其體在下以部位言之凡在下者皆腎所司腎液充腴則肛門不結腎氣充攝則不脫肛惟其二陰皆屬腎竅故經言腎為胃關以飲食之質皆從二陰出也西醫圖書二陰甚悉然不知二陰究屬何臟所以治法不精今按腎開竅於二陰而前陰之病多出心肝後陰之病多由脾胃又以耳為腎竅與心開竅於舌之義相同總見五臟錯綜互相通貫也腎形如豆又似豬腰子腎中有油膜一條貫於脊骨是為腎系此係下連綱膜又有氣管由肺而下附脊循行下入腎系而透入綱膜連於丹田兩腎屬水中間腎系屬火即命門也命門為三焦膜油發源之所故命門相火布於三焦焦即油膜也舊說多誤西醫析言之而不能會通也詳考內經自見又腎靠脊而生有膏油遮掩附腎有薄膜包裹西醫名為腎衣此衣發於腎系乃三焦之源也腎系是油膜層疊結束而成一條貫脊系中內竅通脊髓最深之竅也其次為氣管外通於鼻以吸天陽下入丹田為生氣之根又其次為溺竅水入胃散膜膈中以入腎系合為溺竅透入下焦乃入膀胱西醫但言氣管溺管而不知化精通髓尤有一管名曰命門者水中之陽外通天氣為生命之根源也內經未言溺過腎中然讀三焦為水道膀胱為水府腎為三焦膀之胱主其司溺從可知矣在天為寒在地為水在體為骨在色為黑在音為羽在聲為呻在變動為慄在竅為耳在味為咸在志為恐在液為唾其榮為發其臭為腐其數六其谷豆其畜豕其蟲麟其果慄其菜藿第十九章手厥陰心包絡經穴歌注問心包經左右共十八穴系何名在何處主治何病答厥陰心包何處得乳外二寸天池索三壯三分主何殃四肢不舉兼痎瘧注天池穴在乳外二寸去乳中二寸五分三壯三分主治胸中有聲胸膈煩滿熱病汗不出頭痛四肢不舉腋下腫上氣痎瘧臂痛目䀮䀮不明等症問天泉穴呢答天泉腋下二寸尋三壯六分主何因胸脅支滿兼臂痛風寒心痛目不明注天泉穴在腋下二寸舉臂取之三壯六分主治目䀮䀮不明惡風寒心病胸脅支滿咳逆背疼臂內廉痛等症問曲澤穴呢答曲澤肘內尋動脈大筋內側橫紋得三壯三分主何災心痛氣逆肘臂掣注曲澤穴在肘內廉陷中大筋內側橫紋中有動脈包絡合水穴也三壯三分主治心痛善驚身熱煩渴口乾逆氣嘔吐涎沫身熱風疹臂肘手腕不時動搖等症問郄門穴呢答郄門去腕四寸齊五壯三分何病醫主治吐疝心胃病驚恐畏人神氣離注郄門穴在掌後去腕四寸五壯三分主治嘔血衄血心痛驚恐神氣不足等症問間使穴呢答間使去腕三寸逢包絡經金穴最崇五壯三分主何治心懸胸結霍亂通注間使穴在掌後去腕三寸兩筋間陷中包絡經金穴也五壯三分主治傷寒結胸心懸如飢卒狂惡風寒嘔沫少氣掌中熱腋腫肘攣卒心痛多驚中風氣塞涎上昏危不語咽中如梗霍亂乾嘔婦人經不調血結成塊小兒客忤等症問內關穴呢答內關去腕才二寸三壯五分主何病失志心痛胸肘攣虛則頭強補之應注內關穴在掌後去腕二寸兩筋間三壯五分主治失治心痛目痛支滿肘攣實則心痹痛瀉之虛則頭強補之問大陵穴呢答大陵掌後兩筋中三壯三分輸土名主治手臂腋心病小便赤黃瘡疹癰注大陵穴在掌後兩筋間陷中包絡輸土穴也三壯三分主治熱病汗不出手心熱肘臂廉痛腋腫善笑不休煩心心懸若飢心痛掌熱喜悲泣驚恐目赤黃小便如血狂言不樂喉痹口乾身熱頭痛短氣胸脅痛干瘡疥癬等症問勞宮穴呢答勞宮掌內屈指探包絡滎火分壯三主治中風悲恐笑胸脅支滿身目黃注勞宮穴在掌中央動脈屈中指無名指兩間取之包絡滎火穴也三壯三分主治中風善恐悲笑不休手痹熱病汗不出脅痛不可轉側大小便血衄血不止氣逆嘔噦煩渴飲食不下口中腥臭口瘡胸脅支滿黃疸目黃小兒齦爛等症問中衝穴呢答中衝中指內側覓井木之穴分壯一主治心痛舌強殃煩悶熱病汗不出注中衝穴在手中指內側去爪甲如韭葉陷中包絡井木穴也一壯一分主治熱病煩悶汗不出掌中熱身如火心痛煩滿舌強等症第二十章心包絡解說問心包絡解說呢答包絡一名膻中按膻即胸前膈膜周迴連著脅脊以遮濁氣膈膜名膻而居膻之中者則是心包絡舊注以膜為膻中不知膜遮濁氣只是上焦一大膜耳不能代心宣化何得名臣使之官惟心包絡則相心布令居於膻膈之中故名膻中屬相火又主血以血濟火則和而不烈故主喜樂心憂者包絡之火不宣也心過喜者包絡之火太盛也西醫言心上半有夾膜裹之即包絡之謂也但西醫不知包絡所司何事按手厥陰包絡之脈起於胸中屬心包絡下膈歷三焦出腋入肘抵掌中循中指之端包絡上連肺系由肺系連及於心內之四面皆是油膜又下為膈膜又下為綱油膜所謂膜者皆三焦也三焦與包絡相通其跡如此故包絡之脈下膈歷三焦也出腋入肘抵掌中循中指之端故中指歷心亦由於此包絡與三焦只一膜油相連故其脈從三焦至胸中而歸併於心包出於乳後二寸腋下三寸之間名天池穴脈過腋下至肘抵曲肘陷中名曲澤穴刺痧疫多取此出血以瀉心包之邪也大陵在掌後兩筋之間又中指之末名中衝一作沖良孕婦則此脈動足見心包血旺也第二十一章手少陽三焦經穴歌注問三焦經左右共四十六穴系何名在何處主治何病答三焦名指外關衝井金之穴分壯一主治喉痹捲舌干霍亂氣逆目生翳注關衝穴在手小指次指外側去爪甲角如韭葉三焦井金穴也一壯一分主治喉痹舌卷口乾頭痛霍亂胸中氣噎不嗜食臂肘痛目生翳膜視物不明等症問液門穴呢答液門小次歧骨間滎水之穴分壯三主治驚悸咽外腫寒瘧臂痛暴耳聾注液門穴在小指次指歧骨間陷中三焦滎水穴也三壯三分主治驚悸妄言咽外腫寒厥手臂痛不能自上下痎瘧寒熱目赤澀頭痛暴喑耳聾齒齲等症問中渚穴呢答中渚次指本節後輸本之穴分壯三主治耳聾頭目痛肘臂不舉五指殃注中渚穴在手小指次指本節後陷中液門下一寸三焦輸木穴也三壯三分主治熱病汗不出目眩頭痛耳聾目生翳膜久瘧咽腫肘臂痛五指不得屈伸等症問陽池穴呢答陽池表腕有穴存脈過為原三壯分主治消渴與煩悶手腕肩臂傷損倫注陽池穴在手表腕上陷中三焦脈過為原三壯三分主治消渴口乾煩悶寒熱瘧或因折傷手腕捉物不得肩臂疼不能舉等症問外關穴呢答腕後二寸尋外關三壯三分仔細看主治耳聾並指痛臂肘拘攣此穴安注外關穴在手腕後二寸兩骨間與內關相對手少陽絡也三壯三分主治耳聾渾渾焞焞無聞五指盡痛不能握物及手臂不得屈伸等症問支溝穴呢答支溝腕上三寸約經火之穴兩筋索七壯二分何病治肩臂脅腋四肢藥注支溝穴在腕後臂外三寸兩筋間陷中三焦經火穴也七壯二分主治熱病汗不出肩臂酸重脅腋腫痛四肢不舉霍亂嘔吐口噤不開暴喑不能言心悶不已卒心痛傷寒結胸干瘡疥癬婦人經脈不通產後血暈不省人事等症問會宗穴呢答會宗三寸空中求溝旁一寸無令錯禁針七壯何病治五癇膚痛耳聾著注會宗穴在腕後三寸支溝外旁一寸禁針七壯主治五癇肌膚痛耳聾等症問三陽絡呢答溝上一寸臂大脈三陽絡穴之所宅禁針七壯何病治喑啞耳聾肢反折注三陽絡穴在支溝之上一寸臂上大交脈中七壯禁針主治暴喑啞耳聾嗜臥四肢不欲動搖等症問四瀆穴呢答四瀆肘前五寸間三壯六分陽絡上主治暴氣耳聾症下齒齲痛此穴詳注四瀆穴在肘前五寸三陽絡上是穴三壯六分主治暴氣耳聾下齒齲痛等症問天井穴呢答天井肘上一寸側叉骨罅中屈肘得合土之穴分壯三主治瘰癘偏風捷注天井穴在肘後大骨後肘上一寸輔骨上兩筋叉骨罅中三焦合土穴也三壯三分主治心胸痛咳逆上氣短氣不得語唾膿不嗜食發寒熱不得臥驚悸瘛瘲癲狂五癇風痹耳聾嗌腫喉痹汗出目眥痛頰腫痛耳後臑肘痛中風默默不知所痛悲傷不樂腳氣上攻嗜臥撲傷腰髖疼振寒頸項痛等症問清冷淵呢答肘上二寸清冷淵三壯三分何病痊主治肩痹臂臑痛若針此穴即安然注清冷淵穴在肘上二寸伸肘臂取之三壯三分主治肩痹痛臂臑不能舉等症問消濼穴呢答消濼臂外肘分索三壯一分何病藥主治喉痹頸項強頭痛癲疾此穴著注消濼穴在肩下臂外間腋斜肘分下三壯一分主治風痹頸項強急腫痛寒熱頭痛癲疾等症問臑會穴呢答臑會肩頭三寸前五壯三分何病研主治臂酸不能舉項癭氣瘤肩胛牽注臑會穴在肩前廉去肩頭三寸宛宛中五壯五分主治臂痛酸無力不能舉寒熱肩腫引胛中腫項癭氣瘤等症問肩髎穴呢答肩髎肩端臑上通三壯七分主治同臂痛肩重難伸屈舉臂取之此穴中注肩髎穴在肩端臑上陷中舉臂取之三壯七分主治臂痛肩重不能舉等症問天髎穴呢答天髎盆中毖骨際有空起肉上便是三壯八分何病治肩臂缺盆頸項疾注天髎穴在肩缺盆上毖骨際有空起肉上是穴三壯八分主治胸中煩悶肩臂痠疼缺盆中痛汗不出頸項急寒熱等症問天牖穴呢答天牖傍頸後天容柱前骨下發際中三分禁灸主何治耳聾目眩頭項疼注天牖穴在頸大筋外天容後天柱前禁灸三分主治耳暴聾目不明夜夢顛倒頭風面腫項強不得回顧目中痛等症問翳風穴呢答翳風耳後尖角中七壯三分主治同耳眼口牙項頰病小兒喜欠此穴尋注翳風穴在耳後尖角陷中按之引耳中痛七壯三分主治耳鳴耳聾口眼喎斜脫頷頰腫口噤不語又不能開牙車急小兒喜欠等症問瘛脈穴呢答瘛脈耳後雞足逢三壯一分主治同耳目頭風嘔泄病小兒瘛瘲此穴尋注瘛脈穴在耳後雞足絡脈處三壯一分主治頭風耳鳴小兒驚癇瘛瘲嘔吐泄痢無時驚恐目睛不明等症問顱息穴呢答顱息耳後青絡脈三壯一分何病克主治耳鳴腫出膿瘛瘲發癇臥不得注顱息穴在耳後青絡脈端三壯一分主治耳鳴耳痛喘息小兒嘔吐涎沫瘛瘲發癇胸脅相引身熱頭痛不得臥耳腫出膿汁等症問角孫穴呢答角孫耳廓開有空三壯三分主何因醫治唇吻齒牙疾耳目不利頭項侵注角孫穴在耳廓中間開口有空三壯三分主治目生翳齒齦腫唇吻強齒牙不能嚼物齒齲頭項強等症問絲竹空呢答絲竹眉後陷中探三壯五分主何殃目眩頭疼風癇疾目睫毛倒偏發狂注絲竹穴穴一名太陽穴在眉後陷中三壯五分主治目眩頭痛目亦視物䀮䀮不明睫毛倒惡風寒風癇目不識人發狂吐涎沫發即無時偏正頭疼等症問和髎穴呢答和髎耳前銳發同三壯七分動脈中主治頭痛牙車急頸項耳鼻腫痛癰注和髎穴在耳前銳發下動脈中三壯七分主治頭重頭痛牙車引急頸頷腫耳中嘈嘈鼻涕風寒鼻準上腫癰痛瘛瘲口噼等症問耳門穴呢答耳門耳珠當耳缺禁灸三分何病抉主治聤耳鳴無聞齒齲唇吻開不得注耳門穴在耳前起肉當耳缺陷中三分禁灸主治耳鳴如蟬聲聤耳膿汁出耳生瘡重聽無聞齒齲唇吻強等症第二十二章三焦經解說問三焦經解說呢答手少陽三焦之脈起手小指次指之端循手表上貫肘入缺盆布膻中絡心包絡下膈屬三焦支者出耳上角三焦根於腎系下為胞室為下焦中為連綱附著小腸為中焦上為胸膈又循胸而上統名為膻上連肺系而下入為心包絡故三焦與命門同司相火以其油膜相連也三焦與心包絡相表裡亦以其油膜從膻膈而上入為包絡也三焦經脈貫肘故肘上消濼清冷淵穴種牛痘能發出腎中之毒亦以三焦之源根於腎系故也少陽為衝陽故第一穴名關衝小指次指陷中名中渚抵掌後高骨凡三焦氣旺者此骨乃高起上至肘外大骨縫中名天井穴再上二寸名清冷淵以與手太陽經會而合於寒水之氣也再上至肘外對腋為消濼穴言其主相火也上至缺盆天髎穴即內入心包散行下膈而屬於三焦至缺盆合為一脈支者更上耳後尖骨陷中名翳風穴再上為瘛脈穴風瘛皆肝筋所主而焦膜乃生筋之源也故此二穴有此二名又繞耳前為耳門穴至眉尾空竅為絲竹穴具見腎開竅於耳而三焦屬腎故其經繞耳以應之也按焦字古作膲即人身之膜膈所以行水也今醫皆謂水至小腸下口乃滲漏入膀胱非也醫林改錯及西醫均笑斥之蓋自唐以後皆不知三焦為何物西醫云飲水入胃胃之四面皆有微絲血管吸出所飲之水散走膜膈達入連綱油膜之中而下入膀胱西醫所謂連綱即是膜膈即俗所謂綱油並周身之膜皆是也綱油連著膀胱水因得從綱油中滲入膀胱即古所名三焦者決瀆之官水道出焉是矣三焦之根出於腎中兩腎之間有油膜一條貫於脊骨名曰命門是為焦原從此係發生板油連胸前之膈以上循胸中入心包絡連肺系上咽其外出為手背胸前之腠理是為上焦從板油連及雞冠油著於小腸其外出為腰腹之腠理是為中焦從板油連及綱油後連大腸前連膀胱中為胞室其外出腎莖少腹之腠理是為下焦人飲之水由三焦而下膀胱則決瀆通快如三焦不利則水道閉外為腫脹矣西醫知連綱之形甚悉然不名三焦又不知連綱源頭並其氣化若何皆不知也又按少陽屬腎謂三焦相火其根在命門腎上連肺謂金水相生而膀胱為腑故曰腎將兩臟而配三焦膀胱兩腑難經以左腎為腎右腎為命門或另有取義然則言五臟六腑者舉其要也言六臟六腑者備其物也再加命門而為七臟六腑又其零也蓋天地陰陽奇偶不無零正參伍錯綜以盡其變人之臟腑應之所以經有奇經而臟腑亦有奇零歟少陰屬腎腎上連肺故將兩臟三焦者中瀆之腑也水道出焉屬膀胱是孤腑也是六腑之所與合也上言腎合膀胱此又言腎合三焦蓋以少陽為水中之陽是為相火屬腎者屬於腎中命門也命門即腎系同腎系生連綱油膜是為下焦中生板油是為中焦上生膈膜是為上焦其根源實出於腎系腎系即命門也命門為相火之根三焦根於命門故司相火而屬於腎夫腎具水火合三焦者是相火所合也又云腎上連肺者金水相生是水陰之所合也故腎雖一臟而將為兩臟矣腎主水而行水之腑實為三焦三焦即人身油膜連腸胃及膀胱食入於胃由腸而下飲水入胃則胃之四面均有微管將水吸出散走膜膈此膈即三焦也水由上焦歷肝膈透腎系入下焦油膜以達膀胱故三焦者中瀆之府水道出焉屬膀胱者謂三焦與膀胱相聯屬也是孤之府者謂五臟各配五腑而三焦司腎水之決瀆又獨成一腑也是六腑之所與合句又總言六腑合五臟相合而成功也中國自唐宋後不知三焦為何物是以醫法多訛西醫稱為連綱知其物矣然不知其發源何處所司何氣是以知猶不知故將兩臟之將當讀如將帥之將言少陽三焦下連屬於腎上連屬於肺腎肺相懸全賴少陽三焦以聯絡之然則少陽一腑故已統帥兩臟如一將而將兩營也孤腑云者言少陽三焦獨成一腑極其廣大故統兩臟又言屬膀胱者是三焦下出之路足見自肺至膀胱從上而下統歸三焦也謹按三焦之源即發於腎系故腎與三焦相通三焦為腎行水化氣故腎病宜調和三焦譬如腎氣丸用苓泄以利三焦之水保元湯用黃耆以充三焦之氣是矣三焦病不能行水則宜滋腎陰不能化氣則宜補腎陽近醫不知三焦為何物西醫稱連綱不名三焦且又不知腎係為三焦之根安知人生氣化哉第二十三章足少陽膽經穴歌注問足少陽膽經左右共八十八穴系何名在何處主治何病答少陽瞳髎起目外去眥半寸分壯三主治目翳青盲眼頭痛喉痹此穴探注瞳子髎穴去目外去眥五分三壯三分主治目癢翳膜青盲無見遠視䀮䀮赤痛淚出內眥癢頭痛喉痹等症問聽會穴呢答聽會耳前陷中尋張目得之動脈中五壯三分主何治耳牙口齒肢病從注聽會穴在耳微前陷中動脈宛宛中張口得之五壯三分主治耳鳴耳聾牙車脫不能嚼物齒痛惡寒物狂走瘛瘲恍惚不樂中風口喎斜手足不隨等症問上關穴呢答上關耳前開有空七壯一分主治同唇吻口眼偏喎病耳聾牙齲瘛瘲尋注上關穴一名客主人在耳前骨上開口有空張口取之七壯一分主治唇吻強上口眼喎斜青盲眯目目䀮䀮惡風寒牙齒齲口噤不開嚼物不得耳鳴耳聾瘛瘲沫出寒熱痙引骨痛等症問頷厭穴呢答頷厭顳顬上廉系三壯七分主何治風眩驚癇手腕疼耳目頸疼汗出症注頷厭穴在顳顬上廉三壯七分主治偏頭痛頭風目眩驚癇手卷手腕痛耳鳴目無見目外眥急好嚏頸痛汗出等症問懸顱穴呢答懸顱正在顳顬端三壯三分主治同頭面耳牙皆腫痛身熱鼻濁鼽瞢從注懸顱穴在顳顬端三壯三分主治頭痛牙齒齲牙齒痛而膚赤腫熱病煩滿汗不出偏頭痛引目外眥赤身熱鼻洞濁下之不止傳為鼽瞢暝目等症問懸釐穴呢答懸釐顳顬下廉看三壯三分何病探頭面痛腫不欲食中焦熱病銳眥黃注懸釐穴在顳顬下廉三壯三分主治麵皮赤腫偏頭痛煩心不欲食中焦客熱熱病汗不出目銳眥赤痛等症問曲鬢穴呢答曲鬢掩耳正尖上鼓頷有空分壯三主治牙車頰頷腫腦痛巔風頸項強注曲鬢穴在耳上髮際曲隅陷中鼓頷有空掩耳取之三壯三分主治頷頰腫引牙車不得開急痛口噤不能言頸項不得回顧腦兩角痛為巔風引目眇等症問率谷穴呢答率谷耳上寸半看嚼而取之分壯三主治牙車頰頷腫腦痛巔風頸項強注率谷穴在耳上入髮際一寸半陷中嚼取三壯三分主治痰氣膈痛腦兩角強痛頭重醉後酒風皮膚腫胃寒飲食煩滿嘔吐不止等症問本神穴呢答本神寸半曲差旁直上髮際四分間七壯三分主何治驚癇癲疾偏風探注本神穴在曲差旁寸半直上髮際四分七壯三分主治驚癇吐涎沫頸項強痛目眩胸相引不得轉側癲疾嘔吐涎沫偏風等症問陽白穴呢答陽白眉上一寸取三壯三分直瞳子主治瞳癢目上視背腠寒慄目痛眵注陽白穴在眉上一寸直瞳子正視取之三壯三分主治瞳子癢痛目上視遠視䀮䀮昏夜無見目痛目眵背腠寒慄重衣不得溫等症問臨泣穴呢答臨泣入髮際五分直瞳目上取之真禁灸三分何病治驚癇中風目鼻尋注臨注穴在目上直入髮際五分陷中令患者直睛取之禁灸三分主治目生白翳目淚枕骨合顱痛惡寒鼻塞驚癇反視目外眥痛卒中風不識人等症問目窗穴呢答目窗臨泣後寸半五壯三分何病治頭旋目眩視不明面目浮腫寒熱症注目窗穴在臨泣後寸半五壯三分主治目赤痛忽頭旋目䀮䀮遠視不明頭面浮腫頭痛熱病汗不出等症問正營穴呢答正營目窗後寸五禁針三壯何病取主治頭項偏痛風唇吻急強目眩齲注正營穴在目窗後寸半禁針三壯主治目眩頭項偏痛牙齒齲痛唇吻強急等症問承靈穴呢答承靈正營後寸半禁針三壯主何患醫治腦風頭痛殃鼽衄喘息氣不順注承靈穴在正營後寸半禁針三壯主治腦風頭痛惡風寒鼽衄鼻塞喘息等症問天衝穴呢答天衝耳上二寸逢七壯三分何病從主治癲疾和風痙齦腫頭痛驚恐中注天衝穴在耳後上入髮際二寸七壯三分主治癲疾風痙牙齦腫驚恐頭痛等症問浮白穴呢答浮白耳後上寸得七壯二分何病索足疾耳聾頸項癭肩臂不舉發寒熱注浮白穴在耳後入髮際一寸七壯二分主治足不能行耳聾耳鳴齒痛胸滿不得息胸痛頸項癭癰腫不能言肩臂不舉喉痹咳逆痰沫耳鳴嘈嘈無所聞等症問竅陰穴呢答竅陰枕下動有空七壯三分完上通主治轉筋頭目痛耳鳴舌衄肢疽癰注竅陰穴在完骨上下枕下動搖有空七壯三分主治四肢轉筋目