故此穴載於歸來之下氣衝之間張介賓類經亦取此義問髀關穴呢答髀關伏兔後交中六分禁灸施治同腰痛足麻筋絡急牽腹喉痹痿不仁注髀關穴在伏兔後交紋中六分禁灸主治腰痛足麻木膝寒不仁痿痹股內筋絡急不能屈伸小腹引喉痹等症問伏兔穴呢答伏兔市上三寸取膝上六寸針用三主治膝冷肢攣急癮疹腹脹頭腳良注伏兔穴在膝上六寸起肉處正跪坐取之其肉起如兔之狀因以此名三分禁灸主治膝冷不得溫風勞痹逆狂邪手攣身癮疹腹脹腳氣婦人帶下等症問陰市穴呢答陰市膝上三寸許兔下陷中拜取之禁灸三分主何病腰腳冷痹寒疝宜注陰市穴在膝上三寸伏兔下陷中拜而取之三分禁灸主治腰腳冷如冰膝寒痿痹不仁卒寒疝小腹脹痛腳以上至伏兔寒等症問梁邱穴呢答梁邱膝上二寸量三壯三分主治看膝腳腰疼兼冷痹乳腫足痛屈伸難注梁邱穴在膝上二寸兩筋間三壯三分主治膝腳腰痛冷痹不仁足寒乳腫等症問犢鼻穴呢答犢鼻膝臏骨下尋骨解大筋陷中針三壯三分主何病膝疼難起刺灸行注犢鼻穴在膝臏下胻骨上骨解大筋陷中三壯三分主治膝中痛難跪起等症按膝臏腫潰不可治若犢鼻堅硬勿便攻先熨微刺可也問三里穴呢答三里膝眼下三寸胻骨外廉大筋內極重按之跗脈停三壯一寸合土胃注三里穴在膝眼下三寸胻骨外廉大筋內宛宛中兩筋分肉間舉足取之極重按之則足跗上動脈止矣胃合土穴也三壯一寸主治胃中寒心腹脹滿腸鳴臟氣虛憊真氣不足腹痛食不下大便不通心悶不已卒心痛腹有逆氣上攻腰痛不得俯仰小腸氣水氣蠱毒鬼擊痃癖四肢滿膝胻痠痛目不明產婦血暈秦承祖云諸病皆治華佗云主五勞羸瘦七傷虛乏胸中瘀血乳癰千金翼云主傷寒熱不已熱病汗不出喜嘔口苦口噤鼓頷腫痛不得回顧胃氣不足久泄痢食不化脅下肢滿不能久立膝痿腳氣外臺秘要云人年三十以上若不灸三里令人氣上衝目李東垣曰飲食失節勞役形質陰火乘於坤土之中以致穀氣營氣清氣胃氣元氣不得上升滋於六腑之陽氣是五陽之氣先絕於外外者天也下流入於坤土陰火之中皆由喜怒悲憂恐五賊所傷而後胃氣不行繼之飲食勞役不節則元氣乃傷當於三里穴中推而揚之以伸元氣問上廉穴呢答上廉里下三寸地兩筋骨罅舉足取三壯三分何病醫主治腳氣腰腿疾注上廉穴一名上巨虛又名上巨在三里穴下三寸兩筋骨罅中舉足取之三分三壯甄權以年為壯主治臟氣不足偏風腳氣腰腿手足不仁腳脛痠痛屈伸難不能久立腳膝腫骨髓冷痛等症問條口穴呢答條口上廉下一寸禁灸三分主何治足麻腳冷膝脛寒胻腫轉筋難舉步注條口穴在上廉下一寸舉足取之三分禁灸主治足麻木風氣腳不熱不能久立膝腫脛寒胻腫轉筋足緩不收等症問下廉穴呢答下廉條下一寸裡兩筋骨罅蹲地取三壯八分何病醫腳痿喉痹小腸氣注下廉穴在條口下一寸兩筋骨罅中三壯八分主治小腸氣不足偏風腿痿濕痹喉痹唇乾涎出言語非常婦人乳癰足跗不收跟痛等症問豐隆穴呢答豐隆下廉外一寸上踝八寸分明記陽明絡別走太陰主治腿腹風痰疾注豐隆穴在下廉外一寸直上外踝八寸足陽明絡足走太陰三壯三分主治厥逆大小便難腳膝酸屈伸難胸痛如刺腹若刀切風痰頭痛喉痹不能言等症問解谿穴呢答解谿衝陽後寸半足腕之上針三分胃經火穴勿著艾膝胻腫痛並轉筋注解谿穴在衝陽上寸半足腕上陷中足大指次指直上宛宛中胃經火穴也三分禁灸主治風面浮腫顏黑厥氣上衝腹脹下重瘛瘲膝股胻腫轉筋目眩頭痛癲疾悲泣霍亂頭風面目赤眉攢疼不可忍等症問衝陽穴呢答衝陽陷谷上二寸骨間動脈原穴尋三壯炷微禁針刺主治跗腫腹脹疼注衝陽穴在陷谷上二寸解谿下寸半三壯禁針主治偏風口眼喎跗腫齒齲腹堅大不嗜食登高而歌棄衣而走足緩不收身前痛等症問陷谷穴呢答陷谷內庭後二寸胃輸木穴針灸三主治面與目浮腫腸鳴腹痛此穴詳注陷谷穴在足大指次指外間本節後陷中去內庭二寸胃輸木穴也三壯三分主治面目浮腫腸鳴腹痛等症問內庭穴呢答內庭大次指外間胃滎水穴針灸三主治厥逆腹脹滿口喎齒齲痢傷寒注內庭穴在足大指次指外間陷中胃滎水穴三壯三分主治四肢厥逆腹脹滿數欠氣惡聞人聲咽中引痛口喎上齒齲瘧不嗜食皮膚痛鼻衄不止傷寒逆冷赤白痢等症問厲兌穴呢答厲兌大次指外間去爪韭菜井金探一壯一分主何病屍厥水腫狂疾參注厲兌穴在足大指次指外側去爪甲角如韭葉胃井金穴也一壯一分主治屍厥口噤氣絕狀如中惡心腹脹滿水腫熱病汗不出寒瘧不嗜食面腫足胻寒喉痹上齒齲多驚狂登高棄衣黃疸鼽衄膝臏腫循胸膺乳腹伏兔外廉足跗皆痛消穀善飢等症第八章胃經解說問胃經解說呢答脾合胃胃者五穀之府脾居胃外以膜相連西醫云近胃處有甜肉一條甜肉汁入胃則飲食自化內經云甘生脾是甜肉即脾也無庸另立名目脾主化谷胃主納穀胃者脾之府也胃為陽土脾為陰土納穀少者胃陽虛納穀多而不化者脾陰虛如膈食病糞如羊屎即是脾陰虛無濡潤之氣故燥結不化知脾陰胃陽方能知健脾胃之法李東垣重脾胃而藥方皆取溫燥是但知顧陽而不知顧陰也西醫言胃津化物甜肉汁化物膽汁化物則但主陰汁立論而又不明胃為陽主納穀之理皆偏也按胃之上口接食管曰賁門胃之下口接小腸曰幽門後面與肝膜相連前面與膈膜相連下面與脾相曲抱脾中一物曰甜肉王清任謂為總提即胰子也胰子能去油西醫但言甜肉質化谷而不知其化油也脾又生脂膏所以利水谷在胃中又賴脾土之濕升布津液以濡之然後腐變故胃但稱五穀之府不言化五穀以見胃主納脾主化一燥一濕互為工用也第九章足太陰脾經穴歌注問脾經左右共四十二穴系何名在何處主治何病答拇指內側隱白位脾井木穴針灸三主治胸腹喘滿嘔泄衄屍厥婦孺殃注隱白穴在足大趾端內側去爪甲角如韭葉脾井木穴也三壯三分主治腹鳴喘滿不得安臥嘔吐食不下胸中熱暴泄衄血屍厥不識人足寒婦人月事過時小兒客忤慢驚風等症問太都穴呢答太都節前陷中據赤白肉際骨縫尋三壯三分滎火穴主治腰腿心胃疼注太都穴在足大趾本節前內側陷中骨縫赤白肉間脾滎火穴也三壯三分主治熱病汗不出不得臥身重骨疼手足逆冷腹滿善嘔煩悶目眩腰痛繞踝風心胃疼腹脹胸滿蛔厥小兒客忤等症問太白穴呢答太白核骨下陷中輸土之穴三灸針主治腰腹心胃痛胻酸筋轉胸滿疼注太白穴在足大趾內側核骨下陷中脾輸土穴三壯三分主治身熱煩滿腹脹食不化泄瀉腹血腰痛大便難氣逆霍亂腹中切痛腸鳴腹脹胻酸轉筋身寒骨痛心胃疼胸滿脈緩等症問公孫穴呢答公孫節後一寸取足太陰絡走陽明三壯四分主何病厥氣上逆霍亂尋注公孫穴在足大趾本節後一寸足太陰絡別走陽明三壯四分主治寒瘧不食癇氣好太息多寒熱汗出病至則嘔嘔已乃衰頭面腫起煩心狂言膽虛厥氣上逆霍亂實則腸中切痛瀉之虛則鼓脹補之問商邱穴呢答商邱內踝下微前穴在中封照海間經金針灸三分壯主治脾虛婦孺痊注商邱穴在足內踝骨下微前陷中前有中封後有照海其穴居中脾經金穴也三壯三分主治腹脹腸鳴不便脾虛令人不樂身寒善太息心悲骨痹氣逆痔疾寒熱好嘔陰股內痛氣癰狐疝小腹引痛脾積痞氣黃疸舌強腹脹寒瘧泄瀉體重節痛怠惰嗜臥婦人絕子小兒慢驚等症問三陰交呢答內踝三寸三陰交三壯三分主治饒脾胃虛弱心腹脹妊娠關係手法超注三陰交穴在足內踝上三寸骨下陷中三分三壯妊娠禁針主治脾胃虛弱心腹脹滿脾痛身重四肢不舉腸鳴食不化痃癖腹寒膝內廉痛小便閉陰莖痛足痿難行膽虛食後吐水夢遺失精霍亂逆冷呵欠口張小兒客忤婦人羸弱癥瘕漏血不止妊娠胎動橫生產後惡漏不行去血過多崩暈經脈寒閉瀉之立通虛耗不行者補之則通問漏谷穴呢答漏谷內踝上六寸胻骨下陷三分進主治心腸腹部殃痃癖氣冷足膝病注漏谷穴在足內踝上六寸胻骨下陷中三分禁灸主治腸鳴氣逆腹脹滿急痃癖氣冷膝痹足癰等症問地機穴呢答膝下五寸為地機內側輔骨下陷中三分三壯醫何病腰腹股膝皆可攻注地機穴在膝下五寸膝內側輔骨下陷中伸足取之三分三壯主治腰痛不可俯仰溏泄腹脅脹水腫腹堅小便不利女子癥瘕按之如湯沃股內至膝等症問陰陵泉呢答陰陵內側膝輔際脾合水穴橫紋里五分禁灸何病醫主治腹脅便不利注陰陵泉在膝下內側輔骨下陷中伸足取之即膝橫紋頭下脾合水穴也五分禁灸主治腹中寒不嗜食脅下滿水脹腹堅喘逆不得臥腰痛不可俯仰霍亂疝瘕小便不利氣淋寒熱不節陰痛胸中熱暴泄飧泄等症問血海穴呢答血海分明膝臏上內廉肉際二寸半五分三壯何病醫主治氣逆腹脹患注血海穴在膝臏上二寸半三壯五分主治氣逆腹脹女子漏下月事不調等症問箕門穴呢答箕門血海上六寸魚腹之上越筋際三壯禁針何病醫主治五淋鼠鼷疾注箕門穴在血海上六寸越筋間三壯禁針主治五淋小便不利鼠鼷腫痛等症問衝門穴呢答衝門府舍下一寸四寸三分大橫近五壯三分何疾醫主治積聚子沖病注衝門穴一名慈宮在府舍下一寸大橫下四寸二分去腹中行各四寸半橫骨兩端動脈中五壯三分主治腹寒氣滿腹中積聚陰疝妊娠子衝心等症問府舍穴呢答府舍腹結下二寸五壯七分醫何病主治疝瘕脅搶心腹滿積聚霍亂症注府舍穴在腹結下二寸大橫下三寸三分去腹中行各四寸半五壯七分主治疝瘕循脅上下搶心腹滿積聚霍亂等症問腹結穴呢答腹結橫下寸三分一名腸窟主治論咳逆腹寒繞臍痛搶心逆氣泄痢頻注腹結穴在大橫下一寸三分去腹中行各四寸半五壯七分主治咳逆繞臍痛腹寒泄利搶心氣逆等症問大橫穴呢答大橫哀下三寸五五壯七分何病主大風逆氣寒善悲四肢不仁洞痢許注大橫穴在腹哀下三寸五分平臍去腹中行四寸半五壯七分主治大風逆氣多寒善悲四肢不仁多汗洞痢等症問腹哀穴呢答腹哀日月下寸五去腹中行四寸半三分禁灸何病醫主治便膿腹痛患注腹哀穴在日月下一寸五分去腹中行各四寸半三分禁灸主治寒中食不化大便膿血腹中痛等症問食竇穴呢答食竇天溪下寸六去胸中行各六寸五壯四分何疾醫主治胸脅支滿痛注食竇穴在天溪下一寸六分中府穴下六寸四分平乳根開寸半去胸中行各六寸舉臂取之五壯四分主治胸脅支滿膈間雷鳴等症問天溪穴呢答天溪胸鄉下寸六五壯四分仰而取主治胸滿喉逆聲婦人乳腫㿉癰疾注天溪穴在胸鄉下一寸六分乳中外寸半去胸中行各六寸五壯四分主治胸中滿痛咳逆上氣喉中作聲婦人乳腫㿉癰等症問胸鄉穴呢答胸鄉周榮下寸六四分五壯仰取之主治胸滿引背痛支滿不臥轉側遲注胸鄉穴在周榮下一寸六分仰取五壯四分主治胸脅支滿引胸背痛不得臥轉側難等症問周榮穴呢答周榮中府下寸六四分禁灸何病醫主治胸滿難俯仰咳唾穢膿諸病祛注周榮穴在中府下一寸六分去胸中行各六寸仰取四分禁灸主治胸脅滿不得俯仰咳唾穢膿等症問大包穴呢答大包淵腋下三寸脾經大絡統陰陽三壯三分何病取主治胸脅喘痛難注大包穴在淵腑下三寸腋下六寸為脾經大絡總統陰陽諸絡三壯三分主治胸脅中痛喘氣等症第十章脾經解說問脾經解說呢答脾居中脘圍曲向胃西醫云傍胃又有甜肉生出甜汁從連綱入小腸上口以化胃中之物脾內有血管下通於肝按脾居油膜之上與各臟相通其血氣往來之道路全在油膜中也中國醫書無甜肉之說然甘味屬脾乃一定之理西醫另言甜肉不知甜肉即脾也西醫又云脾中之血壅熱氣以蒸化水穀蓋血即心火所生壅熱氣以化谷者火生土之義也至於脾土製水之說西醫不知言水入口散出於胃走連綱中不知連綱上之膏即脾之膏滑也王清任言脾中有管名玲瓏管水從胃透入此管遂下走雞冠油中又按脾與胃相連處有膜一條其中有管自然無疑脾質凝血而成西醫云脾中有血管回血聚於脾中者極多豈知血是心火所生火生土故統血多食入則脾擁動熱氣以化之西醫又言有甜肉汁化谷按甜肉汁即胰子也生於油上凡膏油皆脾所生之物膏能化水胰子能化油脾稱濕土正指胰子與膏也有此滑潤故腸中通利而化物宋元后圖脾居於右西醫圖脾居於左然淮南子已有脾左肝右之說但脾之應脈實在右手蓋其功用歸於右也在天為濕在地為土在體為肉在色為黃在音為宮在聲為歌在變動為噦在竅為口在味為甘在志為思在液為涎其榮為唇其臭香其數五其谷稷其畜牛其蟲倮按倮蚯蚓之類秉土之精其果棗其菜葵按冬葵子秉土性所生第十一章手少陰心經穴歌注問心經左右共十八穴系何名在何處主治何病答少陰心起極泉中腋下三寸脈入胸七壯三分主何病臂肘厥逆心氣疼注極泉穴在臂內腋下三寸筋間動脈入胸七壯三分主治臂肘厥寒四肢不收心痛乾嘔煩渴目黃脅痛悲愁不樂等症問青靈穴呢答青靈肘上三寸起禁針五壯舉臂取主治頭痛與目黃肩臂振寒不能舉注青靈穴在肘上三寸舉臂取之五壯禁針主治目黃頭痛振寒肩臂不舉等症問少海穴呢答少海肘內節後求肘端五分屈向頭心合水穴三分壯主治頭目肘腋瘳注少海穴在肘內廉節後大骨後去肘端五分屈肘向頭取之心合水穴也三壯三分主治寒熱齒齲目眩發狂嘔吐涎沫項不得回顧肘攣腋脅下痛四肢不舉齒寒腦風氣逆噫噦瘰癧心痛手顫健忘等症問靈道穴呢答靈道掌後寸五分心經金穴三灸針主治乾嘔悲恐症瘛瘲肘攣與暴喑注靈道穴在掌後下廉一寸半心經金穴三壯三分主治心痛乾嘔悲恐相牽瘛瘲肘攣暴喑不能言等症問通里穴呢答通里腕後一寸間心脈之絡針灸三主治眩痛和懊惱熱病不樂此穴詳注通里穴在腕後下廉一寸陷中心脈之絡三壯三分主治目眩頭痛熱病先不樂數日懊惱等症問陰郄穴呢答陰郄掌後去五分三分三壯主治明衄吐灑淅兼厥逆心煩霍亂胸滿疼注陰郄穴在掌後動脈中去掌五分三壯三分主治鼻衄吐血灑淅畏寒厥逆心痛霍亂胸中滿等症問神門穴呢答神門掌後銳骨尋轉手骨開得穴真七壯三分心輸土主治驚悸與呻吟注神門穴在掌後銳骨端陷中轉手骨開心輸土穴七壯三分主治瘧疾心煩欲得冷飲惡寒則欲處溫中咽乾不嗜食心痛數噫恐悸少氣手臂寒面赤喜笑掌中熱而數欠頻呻吟面熱無汗頭風暴喑目痛心悸肘臂疼痛苦嘔喉痹少氣遺溺婦人血症問少府穴呢答少府小指本節後直節勞宮骨縫中二分七壯心滎火主治煩滿肘腋疼注少府穴在小指本節後骨縫陷中直接勞宮心滎火穴也七壯二分主治煩滿少氣悲恐畏人掌中熱臂痛肘腋攣急胸中痛手不伸痎瘧久不愈振寒陰痛偏墮小便不利等症問少衝穴呢答少衝小指內則取去爪甲角韭葉擬心井木穴一壯分主治熱病煩滿疾注少衝穴在手小指內側去爪甲角如韭葉心井木穴一壯一分主治熱病煩滿嗌乾目黃臑臂內痛胸痛痰氣悲驚寒熱肘痛不伸等症第十二章心經解說問心經解說呢答心形上闊下尖周圍夾膜即包絡也其上有肺罩之空懸胸中其下有膈膜遮截膈為膻包絡為膻中心為君主西醫云有腦氣筋貫之有左右房以生血回血又按心之脈絡從包絡中發出以達於周身故包絡為臣使之官西醫言心內分左右四房皆有管竅為生血回血之用血受炭氣則紫回行至心右上房有一總管接回血入心中落右下房又一總管運血出而過肺被肺氣吹去紫色遂變純赤還入心之左上房落左下房又有一總管運血出行遍於周身迴轉於心此即內經榮衛交會於手太陰肺及心主血脈之說也又按心藏神人所以有知覺神主之也神是何物渾言之則兩精相搏謂之神空言之則變化不測謂之神此皆泛言高論未能實指之也吾且為之實指曰神乃生於腎中之精氣而上歸於心合為離卦中含坎水之象惟其陰精內含陽精外護心臟之火所以光明朗潤而能燭物蓋神即心火得腎陰濟之而心中湛然神明出焉故曰心藏神心血不足則神煩心火不足則神怯風痰入心則神昏西醫知心為生血回血之臟而謂心不主知覺主知覺者是腦髓筋又言腦後筋只主運動腦前筋主知覺又言腦筋有通於心者彼不知髓實心之所用而非髓能知覺也蓋髓為腎水之精得心火照之而光見故生知覺矣古人思字從囪從心即以心火照腦髓之義髓如月魄心如日光相照為明此神之所以為用也西醫云心有運血管回血管外則散達周身內則入於心中心中上下四房以存血心體跳動不休而周身血管應之而動是為動脈此說極是脈經云脈為血府即是之謂醫林改錯謂脈是氣管非血管言氣乃能動穴不能動夫果是氣管則隨氣呼吸一呼只當動一至一吸只當動一至何以一呼動二至一吸動二至顯與氣息相錯哉是脈非氣管其應心而動無疑矣故云心之合脈也西醫言脈不足為診具足見西醫之粗淺也脈診兩手始於內經詳於難經事確理真非西醫器具測量所能為也在天為熱在地為火在體為脈在色為赤在音為徵在聲為笑在變動為憂在竅為舌在味為苦在志為喜其液為汗其榮為色其臭為焦其數七其穀麥其畜馬其蟲羽其果杏其菜薤第十三章手太陽小腸經穴歌注問小腸經左右共三十八穴系何名在何處主治何病答手小外側起少澤井金之穴三壯一主治瘧疾喉舌強瘛瘲唾涎頸項急注少澤穴在手小指外側去爪甲角一分陷中小腸井金穴也三壯一分主治瘧疾寒熱汗不出喉痹舌強口乾心煩臂痛瘛瘲咳嗽口中唾涎頸項急不得回顧目生翳頭痛等症問前谷穴呢答前谷外側節前索小腸滎水壯分一主治熱病痎瘧癲頸頰喉鼻臂乳疾注前谷穴在手小指外側本節前陷中小腸滎水穴也一壯一分主治熱病痎瘧癲疾耳鳴項腫喉痹引耳後鼻寒不利咳嗽吐衄臂痛婦人產後無乳等症問後谿穴呢答節後陷中是後谿輸木之穴握拳取一分一壯何病醫癲瘧項強臂肘急注後谿穴在手小指外側本節後陷中握拳取之小腸輸木穴也一分一壯主治瘧疾目赤生翳鼻衄耳聾胸滿項強癲疾臂肘攣急等症問腕骨穴呢答腕骨陷前看外側小腸原穴分壯三黃疸頸項耳目疾脅肘五指頭痛殃注腕骨穴在手外側腕前起骨下陷中小腸原穴也三分三壯主治熱病汗不出脅下痛不得息頷腫寒熱耳鳴目冷淚生翳狂惕偏枯肘不得屈伸痃瘧頭痛煩悶驚風瘛瘲五指掣頭痛等症問陽谷穴呢答腕中骨下陽谷討小腸經火分壯三主治癲狂頸項腫耳目齒舌小兒殃注陽谷穴在手外側腕中銳骨下陷中小腸經火穴也三壯三分主治癲疾狂走熱病汗不出脅痛頸項腫寒熱耳聾耳鳴齒齲痛臂外側痛吐舌戾頸妄言左右顧目眩小兒瘛瘲舌強不語等症問養老穴呢答踝後上陷名養老手太陽郄分壯三主治肩臂手諸疾目視不明此穴參注養老穴在手踝骨後上陷中三壯三分主治肩臂痠疼肩欲折臂如拔手不能自上下目視不明等症問支正穴呢答支正腕後量五寸手太陽絡分壯三主治癲狂虛勞疾肘臂手指諸病詳注支正穴在手腕後五寸手太陽絡三壯三分主治風虛驚恐悲愁癲狂五勞四肢虛弱肘臂攣難屈伸手不握十指盡痛熱病先腰頸酸等症問小海穴呢答小海肘端去五分屈手向頭取之直小腸合土三分壯主治頸項肘臂疼注小海穴在肘之大骨外去肘端五分陷中屈手向頭取之小腸合土穴也三壯三分主治頸項肩臑肘臂外廉痛寒熱齒齦腫風眩頸項痛瘍腫振寒肘腋痛腫小腹痛癇發羊鳴戾頸瘛瘲狂走頷腫肩似拔臑似折耳聾目黃頰腫等症問肩貞穴呢答肩貞胛下兩骨解髃後陷中分壯五主治寒熱耳聾鳴缺盆肩肢痹不舉注肩貞穴在曲胛下兩骨解間肩髃後陷中五壯五分主治傷寒寒熱耳鳴耳聾缺盆肩中熱痛風痹手足麻木不舉等症問臑俞穴呢答臑俞肩胛下廉陷三壯八分主治看臂酸無力肩中痛此穴針之立便安注臑俞穴在肩胛下廉大骨下陷中舉臂取之三壯八分主治臂酸無力肩痛等症問天宗穴呢答天宗大骨下陷中三壯五分主治同肩臂痠疼肘廉痛頰頷氣腫此穴尋注天宗穴在秉風后大骨下三壯五分主治肩臂痠疼肘外後廉痛頰頷腫等症問秉風穴呢答秉風髎後舉有空手三陽足少陽四脈通五壯五分何病治肩疼不舉此穴從注秉風穴在天髎後舉臂有空乃手太陽陽明手足少陽四脈之會五壯五分主治肩痛不舉等症問曲垣穴呢答曲垣肩中曲胛里三壯三分主治同肩痹熱氣注肩胛拘急痛尋此穴中注曲垣穴在肩中央曲胛陷中三壯三分主治肩痹熱痛氣注胛肩拘急痛悶等症問肩外俞呢答外俞肩胛上廉陷去脊三寸主何病六分三壯治同前肩胛寒痛肘周痹注肩外俞在肩胛上廉二椎下去脊各開三寸陷中三壯六分主治肩胛痛等症問肩中俞呢答肩中二寸大椎旁三壯三分何病安主治唾血氣上逆寒熱目疾此穴良注肩中俞在肩胛內廉大椎下去脊各開二寸陷中三壯三分主治咳嗽上氣唾血寒熱目視不明等症問天窗穴呢答天窗頰下動脈詳扶突穴後大筋間三壯三分主何病痔瘻頸肩頰齒殃注天窗穴在頸大筋間曲頰下扶突後動脈應手陷中三壯三分主治痔瘻頭痛肩痛引項耳聾頰腫喉中痛暴喑齒噤中風等症問天容穴呢答天容耳下曲頰後三壯三分主何病咽喉頸項胸部殃嘔逆吐沫口齒噤注天容穴在耳與曲頰後三壯三分主治喉痹寒熱咽中如梗癭頸項癰胸痛滿不得意嘔逆吐沫齒噤耳聾等症問顴髎穴呢答顴髎頄下銳骨隙二分禁灸何病醫主治口喎面目赤眼瞤齒痛此穴奇注顴髎穴在面頄骨下廉陷中二分禁灸主治口喎面赤目黃眼瞤動齒痛等症問聽宮穴呢答聽宮耳珠大如菽手足少陽手太陽三脈交會一分刺主治聾鳴聤耳殃注聽宮穴在耳中珠子大如赤小豆手足少陽手太陽三脈之會一分禁灸主治失音癲疾心腹脹聤耳耳聾如物填塞無聞等症第十四章小腸經解說問小腸經解說呢答小腸上接於胃凡胃所納之物皆受盛於小腸之中西醫云小腸通體皆是油膜相連其油膜中皆有微絲血管與小腸通膽之苦汁從微絲血管注入腸中以化食物脾之甜肉汁亦注於小腸化物而物所化之精汁即從膜中出小腸而達各臟故曰化物出焉王清任醫林改錯以附小腸者為雞冠油更名氣府謂為元氣所存主化飲食而不知內經明言小腸者受盛之官化物出焉已實指小腸之氣化矣其附小腸之油膜即中焦也屬之於脾小腸又繫心之府其相通之路則從油膜中之絲管上膈達心包絡以達於心心遺熱於小腸則化物不出為痢為淋脾陰不足則中焦不能受盛膈食便結三焦相火不足不能熏化水穀則為溏泄西醫又有小腸發炎之症即中醫之瀉痢腸癰中醫近說水入小腸然後從闌門下飛渡入膀胱西醫斥