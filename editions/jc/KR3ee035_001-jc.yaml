盆中腫痛汗出寒瘧胸中脅肋髀膝外廉至絕骨外踝前痛善潔面青面塵等症問懸鐘穴呢答懸鐘三寸同絕骨六分五壯何病探主治心胃腳膝病筋骨攣痹鼻中干注懸鐘穴一名絕骨在足外踝上三寸動脈中五壯六分主治心腹脹滿胃中熱不嗜食腳氣膝胻痛筋骨攣痛足不收逆氣虛勞寒損憂恚心中咳痛喉痹泄注頸項強腸痔瘀血鼻衄腦疽大小便澀鼻中干煩滿中風手足不隨等症問邱墟穴呢答邱墟踝下陷中出骨縫三寸去臨泣膽之原穴分壯三主治髀樞胸脅疾注邱墟穴在足外踝下微前骨陷中膽之原穴三壯三分主治胸脅滿痛不得息久瘧振寒腋下腫痿厥坐不能起髀樞中痛目生翳膜腿胻酸轉筋卒疝小腹堅寒熱頸腫腰胯痛太息等症問臨泣穴呢答臨泣寸半去俠谿輸木之穴分壯三主治胸滿缺盆痛馬刀瘍瘻齧頰殃注臨泣穴在足小指次指本節後陷中去俠谿一寸五分膽輸木穴也三壯三分主治胸中滿缺盆中及腋下馬刀瘍瘻善齧頰天牖中腫淫濼胻酸目眩枕骨痛灑淅振寒心痛厥逆氣喘不能行痎瘧婦人月事不利支滿乳癰等症問地五會呢答五會俠谿後一寸禁灸一分主何病內損唾血與腋疼足無膏澤乳癰痛注地五會在足小指次指本節後陷中去俠谿一寸禁灸一分主治腋痛內損唾血足外無膏澤及乳癰等症問俠谿穴呢答俠谿小指歧骨間滎水之穴分壯三主治胸脅頰頷病耳目胸痛轉側難注俠谿穴在小指次指歧骨間本節前陷中膽滎水穴也三壯三分主治胸脅支滿寒熱傷寒熱病汗不出目外眥赤目眩頰項腫耳聾胸前痛不可轉側等症問竅陰穴呢答竅陰小次指外側去爪甲角如韭葉三壯一分井金名主治咳逆息不得注竅陰穴在足小指次指外側去爪甲如韭葉膽井金穴也三壯一分主治脅痛咳逆不得息手足煩熱汗不出轉筋癰疽頭痛心煩喉痹舌強口乾肘不能舉卒聾目痛等症第二十四章膽經解說問膽經解說呢答按各臟腑遠近不一實皆以膜相連惟膽附於肝最為切近西醫言肝無能事只是化生膽汁而膽汁循油膜入胃則飲食之物得之乃化是中焦之精氣全賴於膽故膽者中精之府也膽屬火肝屬木膽汁為肝所化出是木生火也膽汁化物是木能疏土也故經云食氣入胃散精於肝肝寒則膽汁不能化物肝熱則膽汁化物太過而發中消等症西醫亦云苦膽汁乃肝血所生中國舊說皆謂膽司相火乃肝木所生之氣究之有是氣乃有是汁二說原不相悖惟西醫言人之懼與不懼不關於膽而又不能另指一所實未知膽為中正之官故也蓋以汁論則膽汁多者其人不懼以氣論則膽火旺者其人不懼太過者不得乎中則失其正是以有敢為橫暴之人不及者每在懼怯亦不得乎中正也膽氣不剛不柔則得成為中正之官而臨事自有決斷以肝膽二者合論肝之陽藏於陰故主謀膽之陽出於陰故主斷所以足少陽起目銳眥名瞳子髎繞耳前陷中名聽會繞耳後髮際陷中名風池皆少陽風木所發泄處下至肩上陷中名肩井循側旁下至肝經期門穴下五分名日月膽脈實從肝經出於此穴然後上下行也下行至股外垂手中指盡處名風市膝下一寸名陽陵循外踝至小指次指之間竅陰穴而終陽經根於陰穴以見陽生於陰中也又按足少陽膽之脈起於目外眥繞耳前後至肩下循腋里絡肝屬膽下至足入小指之間足少陽與手少陽脈均行於耳均司相火內則三焦之膜連肝而及於膽外則三焦之經絡耳而交於膽經此以見臟腑相通之妙第二十五章足厥陰肝經穴歌注問足厥陰肝經左右二十八穴系何名在何處主治何病答厥陰大敦三毛側三壯三分井木穴主治臍腹諸病殃淋疝血崩與屍厥注大敦穴在足大指三毛際內側陷中肝井木穴也三壯三分主治五淋七疝小便數遺不禁陰頭中痛汗出陰上入小腹陰偏墜臍腹中痛悒不樂腹脹腫痛小腹痛中熱喜寐屍厥狀如死人婦人血崩不止陰挺出陰中痛等症問行間穴呢答行間骨間動脈中三分三壯認真攻滎火之穴主何治咳逆嘔血及轉筋注行間穴在足大指本節上內側前後有小骨尖其穴正居陷中有動脈應手三分三壯主治嘔逆洞泄遺溺癃閉消渴嗜飲善怒四肢滿轉筋胸脅痛小腹腫咳逆喘血莖中痛腰疼不可俯仰腹中脹滿肝心痛色蒼蒼如死狀口喎癲疾短氣四肢逆冷嗌乾煩渴瞑不欲視目中淚出太息便溺難七疝寒疝中風肝疾肥氣發痎瘧婦人小腹腫面塵脫色經血過多不止崩中小兒驚風等症問太衝穴呢答太衝大指本節後去節二寸絡五會主治心腹腰脅殃女子漏下小兒疝注太衝穴在足大指本節後去節二寸或云寸半其絡連地五會動脈應手陷中肝輸土穴也三壯三分主治心痛脈弦馬蝗瘟疫肩腫吻傷虛勞浮腫腰引小腹痛兩丸牽縮溏泄遺溺陰痛面目蒼色胸脅支滿足寒肝心痛蒼然如死狀大便難便血小便淋小腸疝氣痛頹疝小便不利嘔血嘔逆發寒嗌乾善渴肘腫內踝前痛淫濼胻酸腋下馬刀瘍漏唇腫女子漏下不止小兒卒疝等症問中封穴呢答中封一寸內踝前經金之穴分壯三主治痎瘧繞臍痛痿厥筋攣此穴探注中封穴在內踝骨前一寸筋骨宛宛中伸足得之肝經金穴也三壯四分主治瘧疾色蒼蒼振寒小腹腫痛食怏怏繞臍痛五淋不得小便足厥冷身黃有微熱不嗜食身體不仁寒疝腰痛或身微熱痿厥失精筋攣陰縮入腹相引痛等症問蠡溝穴呢答蠡溝踝上五寸據三壯三分主何治癃閉氣下部殃足脛寒酸月經事注蠡溝穴一名交儀在內踝上五寸三壯三分主治疝氣小腹脹滿暴痛癃閉數噫恐悸少氣悒悒不樂咽中悶如有息肉背拘急不可俯仰小腹不利臍中積氣如石足脛寒酸屈伸難女子赤白帶下月事不調等症問中都穴呢答中都七寸胻骨中五壯三分何病針腸癖脛寒兼潰疝婦人崩帶此穴攻注中都穴一名中郄在足內踝上七寸胻骨中五壯三分主治腸澼潰疝小腹痛不能行立脛寒婦人崩中產後惡露不絕等症問膝關穴呢答膝關犢下二寸容五壯四分主治同風痹膝內廉疼痛膝臏不舉咽喉癰注膝關穴在犢鼻下二寸旁陷中五壯四分主治風痹膝內臁痛引臏不能屈伸咽喉中癰痛等症問曲泉穴呢答曲泉紋頭兩筋陷合水之穴六三壯主治潰疝陰股疼身目眩痛不出汗注曲泉穴在膝股下內側輔骨下大筋下小筋上陷中屈膝橫紋頭取之肝合水穴也三壯六分主治潰疝陰股痛小便難腹脅支滿癃閉少氣泄利四肢不舉身目眩痛汗下出目䀮䀮膝關痛筋攣不可屈伸發狂衄血下血喘呼小腹痛引咽喉房勞失精身體極痛泄水下利膿血陰腫陰莖腫痛胻腫膝脛冷疼女子血瘕小腹腫陰挺出等症問陰包穴呢答陰包四寸膝臏上內廉筋間展足探三壯六分主經病腰尻引腹小便難注陰包穴在膝上四寸股內廉兩筋間三壯六分主治腰尻引小腹痛小便難遺溺婦人經水不調等症問五里穴呢答五里氣衝下三寸動脈應手陰股向五壯六分何病治腸中熱滿不得溺注五里穴在氣衝下三寸陰股內動脈應手五壯六分主治腸中滿熱閉不得溺風勞嗜臥等症問陰廉穴呢答陰廉穴在橫紋胯去沖二寸羊矢下禁針三壯何病治婦人絕產三壯效注陰廉在羊矢下去氣衝二寸動脈中三壯禁針主治婦人絕產若未經生產者灸三壯即有子問羊矢穴呢答羊矢氣衝外一寸分明有穴君可問此穴又名白鼠鼷諸經闕治可無論注羊矢穴一名鼠鼷在氣衝旁一寸是穴問章門穴呢答章門臍上二寸量橫取六寸看兩旁七壯六分主何治腸鳴腹痛肝脾殃注章門穴在大橫外直季肋端臍上二寸兩旁各開六寸側臥屈上足伸下足取之又云肘尖盡處是穴脾之募足少陽厥陰之會難經云臟會章門疏曰臟病治此七壯六分主治腹鳴盈盈然食不化脅痛臥不得煩熱口乾不嗜食胸脅痛支滿喘息心痛而嘔腰痛不可轉側腰脊冷痛溺多白濁傷食身黃瘦賁豚積聚腹腫如鼓脊強四肢懈惰善恐少氣厥逆肩背不舉等症東垣曰氣在於腸胃者取之魏士珪妻徐病疝自臍下上至於心皆脹滿嘔吐氣逆煩悶不進飲食滑伯仁曰此寒在下焦為灸章門氣海問期門穴呢答期門乳下二肋間一寸五分不容旁主治熱病入血室心下痞硬分壯三注期門穴在直乳下二肋間不容旁寸半三壯三分主治胸中煩熱賁豚上下目青而嘔霍亂泄利腹堅大喘不得安臥脅下積氣傷寒心切痛喜嘔酸飲食不下食後嘔水胸脅痛支滿男女血結胸滿面赤火燥煩悶口乾消渴胸中痛等症第二十六章肝經解說問肝經解說呢答舊說肝七葉居左脅下非也西醫云四葉後靠脊前連膈膜膽附於肝之短葉間膈即附脊連肝從肝中生出前連胸膛肝體半在膈上半在膈下實不偏居於左謂肝居左者不過應震木東方位自當配於左耳醫林改錯言肝系後著脊前連胃名為總提上有胰子總提內有行水管為胃行水西醫言肝無所事只以回血生出膽汁入腸化物二說言肝行水化食不過內經肝主疏泄之義而已至肝系之理尚未詳言按肝繫上連心包絡故同稱厥陰經繫著脊處則為肝俞穴系循腔子一片遮盡是為膈膜肝系下行前連腹中統膜而後連腎系為肝之根通身之膜內連外裹包肉生筋皆從肝系而發舊說言肝居左西醫言肝居右然其系實居脊間正中至診脈分部左右亦從其氣化而分非以形跡而分也肝脈交顛入腦由腦而通於目故肝開竅於目肝藏魂晝則魂遊於目而為視夜則目閉魂復返於臟西醫剖割眼珠極贊重疊細絡之妙受光照察之神然試問醒開寐閉黑子瞳子之所由生則不知也又使無神水而欲其受外光能乎惟心火腎水交會於腦令肝脈注目中肝者心之母腎之子故並二臟之精而開竅於目西醫之精能將斜目修削使正然不久仍斜不知病源剖割何益又人身之陰陽陰主靜靜則有守陽主動動則有為肝為厥陰經乃陰之盡也故其性堅忍而有守厥陰中見少陽陰盡陽生膽火居於肝中陰中合陽陽氣發動故能有為謀慮從此而出所以稱為將軍之官故肝氣橫者敢為狂亂肝氣虛者每存懼怯足厥陰肝脈起足大指叢毛之際上足跗循股內過陰器抵小腹屬肝絡膽挾胃貫膈循喉嚨上過目系與督脈會於顛頂又按毛髮皆血之餘也肝主血故肝經起於足大指而其間即生叢毛以為主血之驗陰器名為宗筋乃通身筋之所主屬肝經故肝脈繞於陰器也小腹兩旁皆屬肝經故有寒疝等症絡膽者厥陰之脈中見少陽肝與膽相表裡也挾胃者肝木清陽之氣上升疏土所以化物貫膈循喉嚨故肝氣逆有嘔滿諸症上連目系肝開竅於目也與督脈會於顛頂督脈屬腎為肝之母會於顛頂子會於母目系顛頂內為腦髓腦風暈迷均肝所司以其脈相通也西醫詳論腦髓而無治髓之藥蓋不知髓系督脈所生又不知髓系肝脈所貫耳大敦循足內側上至曲泉曲泉在曲膝橫紋盡處乃諸筋會於膝之穴也循股內抵陰器之橫骨盡處名鼠鼷穴繞陰器故生毛肝血所發泄也抵少腹上肋曲肘尖盡處為章門再上為期門穴乃肝之募謂肝膜之所通也從此入屬肝臟此為肝下行之脈貫膈絡胃循喉嚨上連目系則開竅於目與督脈會於顛陽經惟太陽最長陰經惟厥陰最長乃氣血之主司也在天為風在地為木在體為筋在色為蒼在音為角在聲為呼在變動為握在竅為目在味為酸其液為淚其華為爪其臭為臊其谷為麥其畜為雞其蟲為毛大而虎豹小而毛蟲皆風木之氣所生故肝病癲癇或作虎豹之狀又有偏體生毛者西醫五種有博物新編圖畫獅象小蟲毫芒皆具然不知屬風木之所生則於醫理物理不能推到造化根源也其數八其果李其菜韭附十四經公安部圖
