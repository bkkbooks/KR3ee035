body:
  text: 卷上第一章十二經名歌注問何謂十二經答太陽小腸足膀胱陽明大腸足胃鄉少陽三焦足膽配太陰手肺足脾當少陰手心足為腎厥陰包絡足肝方注手太陽即小腸經手少陽即三焦經手陽明即大腸經也足太陽即膀胱經足少陽即膽經足陽明即胃經也手太陰即肺經手少陰即心經手厥陰即心包絡也足太陰即脾經足少陰即腎經足厥陰即肝經也第二章十二經循行部位歌注問手足三陰三陽經循行部位呢答手之三陰胸內手手之三陽手外頭足之三陽頭外足足之三陰足內求注手之三陰胸內手者謂手太陰肺經從胸乳上中府穴循行臑內下行手臂內之上行至手大指內側之端少商穴也手厥陰心包絡經從腋下乳外天池穴循行臑內下行肘臂內之中行至手中指內側之端中衝穴也手少陰心經從腋下筋間極泉穴循行臑外下行手臂內之下行至手小指內側之端少衝穴也手之三陽手外頭者謂手陽明大腸經從手食指外側之端商陽穴上行手臂外之上行至頭鼻孔兩旁迎香穴也手少陽三焦經從手無名指外側之端關衝穴上行手臂外之中行至頭耳前動脈耳門穴也手太陽小腸經從手小指外側之端少澤穴上行手臂外之下行至頭耳中珠子聽宮穴也足之三陽頭外足者謂足陽明胃經從頭維穴起循頸至乳下行腹外股膝跗之前行至足二指外側之端厲兌穴也足少陽膽經從頭目外眥瞳髎穴循行繞耳顱顛下行脅跨膝跗之中行至足四指外側之端竅陰穴也足太陽膀胱經從頭目內眥睛明穴循行額顛項背外行臀膕腨踝之後行至足小指外側之端至陰穴也足之三陰足內求者謂足厥陰肝經從足大指三毛際橫紋內側大敦穴循行前行上行內踝腨膝之中行內行陰器腹脅之外行至乳下期門穴也足太陰脾經從足大指內側之端隱白穴循行內踝膝里之中行上行股內之上行循腹上胸至季肋大包穴也足少陰腎經從足心湧泉穴循行內踝足跟內之後行上腹至胸俞府穴也問頭前正面呢答頭督唇任五中行眥內足太顴手陽眥外足少繞耳手鼻旁手明唇足方注頭之正面分五行其中行上唇以上屬督脈下唇以下屬任脈其第二行目內眥旁上屬足太陽膀胱經睛明穴鼻旁下屬手陽明大腸經迎香穴其第三行自頭維穴至唇旁地倉穴屬足陽明胃經其第四行面顴骨外旁顴髎穴屬手太陽小腸經頭側上屬足少陽膽經瞳髎等穴其第五行繞耳前後屬手少陽三焦經角孫等穴也問頭後項頸呢答頭後五行督中行惟二足太余少陽頸前任中二足明三手四行手太陽五手少陽六是足七足太陽督中行注頭後分五行其中行屬督脈惟兩旁第二行屬足太陽膀胱經其餘第三行承靈等穴四行完骨等穴五行天衝等穴皆屬足少陽膽經前後項頸分七行頸前中行屬任脈二行屬足陽明胃經人迎水突等穴三行屬手陽明大腸經扶突天鼎穴四行屬手太陽小腸經天窗天容穴五行屬手少陽三焦經天牖穴六行屬足少陽膽經風池穴七行屬足太陽膀胱經天柱穴項後中行屬督脈經也問胸腹脊背呢答胸腹二行足少陰三足陽明四太陰五足厥陰六是膽脊背二三膀胱經注胸腹之中行屬任脈其兩旁第二行屬足少陰腎經俞府等穴其第三行屬足陽明胃經氣戶等穴其第四行屬足太陰脾經周榮等穴乳下肋上第五行屬足厥陰肝經期門等穴脅後第六行屬足少陽膽經淵腋輒筋京門帶脈等穴脊外兩旁二行三行俱屬足太陽膀胱經大杼附分等穴脊之中行屬督脈經也第三章手太陰肺經穴歌注問肺經左右共二十二穴系何名在何處主治何病答太陰肺兮出中府雲門之下寸六許針灸五壯和三分主治胸腹腫脹滿注中府穴在雲門穴下一寸六分乳上三肋間動脈應手陷中去胸中行各六寸乃肺之募穴按募猶結募也言經氣聚結於此針三分灸五壯主治腹脹肢腫氣喘胸滿等症問雲門穴呢答雲門氣戶旁二寸巨骨之下舉臂取灸可五壯針禁深主治咳喘癭氣滿注雲門穴在巨骨穴下俠氣戶旁二寸氣戶在俞府旁二寸俞府在璇璣旁二寸去胸中行各六寸舉臂取之針二分灸五壯主治傷寒四肢熱不已咳逆喘不得息胸脅短氣氣上衝心胸滿脅徹背痛癭氣等症問天府穴呢答天府腋下三寸求肘腕五寸上側取四分禁灸何病治暴痹衄血中風侶注天府穴在腋下三寸臂內上側去肘腕上五寸動脈中用鼻尖點墨到處是穴四分禁灸主治暴痹口鼻衄血中風邪飛屍惡症寒熱瘧目眩暈癭氣等症問俠白穴呢答俠白與天府為鄰肘端五寸動脈中五壯三分主何病乾嘔煩悶心氣疼注俠白穴在天府穴外側去肘端五寸三分五壯主治心痛氣短乾嘔逆煩滿等症問尺澤穴呢答盡澤肘中約紋上肺合水穴針五分主治肩疼臑肘痛肢腫脊強小兒驚注尺澤穴在肘中約紋上動脈中屈肘橫紋筋骨罅陷中乃肺之合水穴也五分禁灸主治肩背痛汗出中風小便數善嚏悲哭寒熱風痹臑肘攣手臂不舉喉痹上氣咳嘔唾濁肢腹腫心胃疼肺膨脹心煩悶腰脊強痛小兒慢驚等症問孔最穴呢答孔最腕上七寸舉一分五壯側取之主治熱病汗不出肘臂厥痛咽腫奇注孔最穴在腕上七寸側取一分五壯主治汗不出咳逆肘臂厥痛屈伸難手不及頭指不能握吐血失音咽腫頭痛等症問列缺穴呢答列缺腕側寸五分又為肺絡走陽明二分七壯主何治偏風癰痛此穴尋注列缺穴在腕側上寸半以兩手交叉食指盡處是穴二分七壯主治偏風半身不遂口噤不開寒熱瘧咳嗽縱唇口癇驚妄見面肢癰腫胸背寒慄屍厥等症問經渠穴呢答經渠寸口動脈中肺經金穴二分針主治胸背兼喉痹咳逆喘促與心疼注經渠穴在寸口動脈應手陷中肺經金穴也二分禁灸主治寒熱瘧胸背拘急胸滿喉痹喘促心疼嘔吐等症問太淵穴呢答太淵掌後橫紋頭肺輸土穴脈病求三壯二分主何治胸痹氣逆眼目瘳注太淵穴在掌後內側橫紋頭動脈中肺輸土穴也肺虛補之難經云脈會太淵乃八會之一脈病治此二分三壯主治胸痹氣逆噦嘔飲水咳嗽煩悶不得眠肺脹膨臂內廉痛目生白翳眼赤痛缺盆引臂痛寒喘脈澀等症問魚際穴呢答魚際大指本節後亦云滎火散脈里二分禁灸何病治肺胃氣膨當取此注魚際穴在大指本節後內側白肉際陷中又云散脈里肺之滎火穴也二分禁灸主治酒病惡風寒虛熱舌上黃身熱頭痛汗不出腹痛食不下肘攣肢滿喉中乾燥寒慄鼓頷咳引尻痛溺出嘔血心痹乳癰等症問少商穴呢答少商大指看內側去爪韭葉尋甲角肺井木穴針三分三稜出血瀉臟熱注少商穴在兩手大指內側去爪甲角如韭葉乃肺之井木穴也三分禁灸主治頷腫喉痹煩心善噦痎瘧振寒鼓頷喉腫等症按唐刺史成君綽忽頷腫大如升喉中閉塞水粒不下者三日甄權以稜針刺之微出血立愈第四章肺經解說問肺經解說答舊說云肺八葉非也西醫云五葉右三左二披離下垂後附脊骨前連胸膛肺中有管竅通於膈膜而下達氣海肺質輕鬆外有膜沫濡潤以助呼吸西醫云肺覆而盂前兩葉包心在後有峽及肺根此根即氣管肺脈連綱等包裹肺衣而成每葉外有衣薄而通明包肺四面肺有縮力每葉藏氣管氣管之末為氣泡肺脈至氣泡而散功用主呼吸也此說於肺衣氣泡頗為詳明宋元后不知肺之功用全在衣與泡也按人身血肉塊然陰之質也有是質即有宰是質者秉陰精之至靈此之謂魄肝主血本陰也而藏陽魂肺主氣本陽也而藏陰魄陰生於陽也實指其物即肺中清華潤澤之氣西醫所謂肺中亦有膜沫是也惟其有此沫則散為膏液降為精血陰質由是而成矣魂主動魄主靜百合病恍惚不寧魄受擾也魔靨中惡魄氣被掩也人死為鬼魄氣所變也凡魂魄皆無形有氣變化莫測西醫剖割不見遂置弗論夫談醫而不及魂魄安知生死之說哉又肺為乾金體高而大如天之無不覆氣達於外以衛周身如天之無不包故合於皮毛凡是外感無不治肺也西法用數百倍顯微鏡照見毛形如樹其下有坑坑內有許多蟲或進或出其實皆氣之出入也蓋肺主氣肺中盡是氣孔鼻者直出之孔毛者橫出之孔鼻氣大故人皆知之毛孔之氣小故人不知實則鼻氣一出則毛孔之氣俱出鼻氣一入則毛孔之氣俱入西國人不知皮毛與肺相連皆是從毛竅相通也在天為燥在地為金在體為皮毛在色為白在音為商在聲為哭在變動為咳在竅為鼻在味為辛在志為憂在液為涕其榮為毛其臭為腥其數九其谷稻其畜狗其蟲甲其果梨其菜韭第五章手陽明大腸經穴歌注問大腸經左右共四十穴系何名在何處主治何病答手陽明兮屬大腸食指外側號商陽又為大腸金井穴一分三壯爪角間注商陽穴一名絕陽在手大指次指外側去爪甲角如韭葉大腸井金穴也一分三壯主治胸中氣滿喘咳肢腫熱病耳聾寒熱痎瘧口乾頤頷腫齒痛惡寒肩臂緊急引缺盆痛目青盲灸三壯左取右右取左如食頃立愈問二間穴呢答本節前取二間定一名間谷穴水滎三壯三分實則瀉主治喉痹頷腫侵注二間穴一名間谷在手食指本節前外側陷中大腸滎水穴三壯三分主治喉痹頷腫肩背痛振寒鼻鼽衄齒痛目黃口乾口喎急食不通傷寒水結等症問三間穴呢答三間食指節後尋又為少谷輸木名三壯三分看主治咽梗喉痹牙眼疼注三間穴一名少谷在食指本節後外側陷中大腸輸木穴也三壯三分主治喉痹咽梗下齒齲痛胸腹滿腸鳴洞泄寒熱瘧唇焦口乾氣喘目眥急痛吐舌戾頸善驚多唾急食不通傷寒氣熱等症問合谷穴呢答歧骨陷中尋合谷又為原穴分壯三主治頭面諸般症妊娠之婦補墮胎注合谷穴一名虎口在手大指次指歧骨間陷中大腸原穴也三分三壯主治傷寒大渴脈浮在表發熱惡寒頭痛脊強無汗寒熱瘧鼻衄不止目生白翳頭痛下齒齲耳聾喉痹面腫唇吻不收口噤不開風疹痂疥偏正頭痛腰脊引痛小兒乳蛾惟妊娠婦禁針按宋太子出苑逢妊婦診之曰女胎徐文伯曰系一男一女太子性急欲剖而視之文伯止之為瀉三陰交補合谷胎應針而下果如文伯之言後世遂以陰交合谷為妊婦禁問陽谿穴呢答陽谿腕中上側詳穴名經火針灸三主治狂言如見鬼頭目喉耳肘臂殃注陽谿穴一名中魁在腕中上側兩筋間陷中大腸經火穴也三壯二分主治狂言喜笑見鬼熱病心煩目風赤爛有翳厥逆頭痛胸滿不得息寒熱瘧疾寒嗽嘔沫喉痹耳鳴耳聾驚掣肘臂不舉痂疥等症問偏歷穴呢答腕後三寸是偏歷又為別絡走太陰三壯三分主何病肩肘腕痛頭病侵注偏歷穴在陽谿後腕外側去腕三寸大腸絡脈別走太陰三壯三分主治肩膊手腕痠痛瞇目䀮䀮齒痛鼻衄寒熱瘧癲疾咽乾喉痹耳鳴汗不出小便數實則齒齲耳聾瀉之虛則齒寒鬲痹補之問溫溜穴呢答溫溜穴居五五分又有逆注池頭稱三壯三分主何治腸膈喉舌肢腫疼注溫溜穴兼名逆注池頭乃一穴三名其穴在偏歷後去腕五寸半三壯三分主治腸鳴腹痛傷寒噦逆寒熱頭痛喜笑狂言見鬼吐涎沫四肢腫口痛喉痹等症問下廉穴呢答下廉上廉下一寸三壯三分主治看飧泄癆瘵小腹脹熱風冷痹面無顏注下廉穴在肘輔骨下去上廉一寸曲池下四寸輔銳肉分外斜三分三壯主治飧泄癆瘵小腹滿小便黃便血狂言熱風冷痹小腸氣短面無顏色痁癖腹若刀刺腹脅痛滿狂走俠臍痛食不化喘息難行唇乾涎出乳癰等症問上廉穴呢答上廉三里下一寸陽明之會穴外斜三壯五分主何治半身不遂手足麻注上廉穴在三里穴下一寸曲池下三寸陽明之會外斜五分三壯主治小便難黃赤腸鳴胸痛偏風半身不